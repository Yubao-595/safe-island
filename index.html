<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#7cbf68" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>安全岛 · Sanctuary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+SC:wght@200;300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #cfe7b0;
    font-family: 'Inter', -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
    color: rgba(255,255,255,0.92);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    font-weight: 300;
  }
  :root {
    --vh: 1vh;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --cn: 'Noto Serif SC', "PingFang SC", "Hiragino Sans GB", sans-serif;
    --ink: rgba(255, 255, 255, 0.92);
    --ink-soft: rgba(255, 255, 255, 0.66);
    --ink-faint: rgba(255, 255, 255, 0.40);
    --hair: rgba(255, 255, 255, 0.28);
    --glass: rgba(255, 255, 255, 0.08);
    --glass-strong: rgba(255, 255, 255, 0.12);
  }
  #scene {
    display: block;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    height: calc(var(--vh) * 100);
  }

  /* ---------- Overlay root ---------- */
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  #ui > * { pointer-events: auto; }

  /* ---------- TOP LEFT — editorial masthead ---------- */
  .masthead {
    position: absolute;
    top: calc(var(--safe-top) + 38px);
    left: 40px;
    pointer-events: none;
  }
  .masthead .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .masthead .eyebrow::before {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--hair);
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(38px, 8vw, 64px);
    letter-spacing: 0.18em;
    line-height: 1;
    color: var(--ink);
    text-transform: uppercase;
    margin-bottom: 14px;
    margin-left: -2px;
  }
  .masthead .cn {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 13px;
    letter-spacing: 0.5em;
    color: var(--ink-soft);
    padding-left: 4px;
  }
  .masthead .rule {
    margin-top: 28px;
    width: 56px;
    height: 1px;
    background: var(--hair);
  }
  .masthead .caption {
    margin-top: 20px;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--ink-faint);
    line-height: 1.9;
    max-width: 240px;
  }

  /* ---------- TOP RIGHT — fullscreen "art entry" ---------- */
  .fs {
    position: absolute;
    top: calc(var(--safe-top) + 38px);
    right: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    background: transparent;
    border: none;
    color: inherit;
    font-family: inherit;
    padding: 0;
  }
  .fs .ring {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid var(--hair);
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    display: flex; align-items: center; justify-content: center;
    transition: background 1.4s ease, border-color 1.4s ease, transform 1.4s ease;
  }
  .fs:hover .ring {
    background: var(--glass-strong);
    border-color: rgba(255,255,255,0.45);
  }
  .fs .ring svg {
    width: 18px; height: 18px;
    stroke: var(--ink);
    fill: none;
    stroke-width: 1;
  }
  .fs .label {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-soft);
    padding-left: 4px;
  }

  /* ---------- LEFT MID — breathing orb block ---------- */
  .breathe {
    position: absolute;
    left: 40px;
    bottom: calc(var(--safe-bottom) + 230px);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 18px;
    pointer-events: none;
  }
  .breathe .label-en {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.42em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .breathe .label-cn {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-faint);
    margin-top: -10px;
  }
  .orb {
    position: relative;
    width: 78px;
    height: 78px;
    margin-top: 6px;
  }
  .orb .core,
  .orb .halo,
  .orb .halo2 {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .orb .core {
    background: radial-gradient(circle at 38% 38%,
      rgba(255,255,255,0.95) 0%,
      rgba(240,255,225,0.50) 38%,
      rgba(220,245,200,0.0) 72%);
    animation: orbBreathe 11s ease-in-out infinite;
  }
  .orb .halo {
    background: radial-gradient(circle,
      rgba(255,255,255,0.18) 0%,
      rgba(220,245,200,0) 70%);
    transform: scale(1.6);
    animation: orbBreathe 11s ease-in-out infinite;
    animation-delay: -1.5s;
  }
  .orb .halo2 {
    background: radial-gradient(circle,
      rgba(220,245,200,0.10) 0%,
      rgba(220,245,200,0) 70%);
    transform: scale(2.4);
    animation: orbBreathe 11s ease-in-out infinite;
    animation-delay: -3s;
  }
  @keyframes orbBreathe {
    0%, 100% { opacity: 0.45; transform: scale(0.78); }
    50%      { opacity: 1;    transform: scale(1.08); }
  }

  /* ---------- LEFT BOTTOM — "01 ENTER SANCTUARY" ---------- */
  .enter {
    position: absolute;
    left: 40px;
    bottom: calc(var(--safe-bottom) + 36px);
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 22px;
    align-items: end;
    cursor: pointer;
    background: transparent;
    border: none;
    color: inherit;
    font-family: inherit;
    text-align: left;
    padding: 0;
    transition: opacity 1.4s ease;
  }
  .enter:hover { opacity: 0.78; }
  .enter:active { opacity: 0.62; }
  .enter .num {
    position: relative;
    font-family: var(--serif);
    font-weight: 300;
    font-size: 72px;
    line-height: 0.82;
    color: var(--ink);
    letter-spacing: -0.02em;
    padding-right: 22px;
  }
  .enter .num::after {
    content: '';
    position: absolute;
    top: 6px;
    right: 0;
    width: 1px;
    height: calc(100% - 12px);
    background: var(--hair);
  }
  .enter .meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 6px;
  }
  .enter .en {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .enter .cn {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--cn);
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.32em;
    color: var(--ink);
  }
  .enter .arrow {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1;
    transition: transform 1.2s ease;
  }
  .enter:hover .arrow { transform: translateX(6px); }

  /* ---------- BOTTOM RIGHT — floating player ---------- */
  .player {
    position: absolute;
    right: 40px;
    bottom: calc(var(--safe-bottom) + 36px);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 14px 12px 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 999px;
    box-shadow: 0 10px 40px rgba(30, 50, 30, 0.18);
    min-width: 290px;
    max-width: min(360px, 70vw);
    transition: opacity 1.4s ease;
    animation: playerFloat 9s ease-in-out infinite;
  }
  @keyframes playerFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .player .note-icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    stroke: var(--ink);
    fill: none;
    stroke-width: 1;
    opacity: 0.85;
  }
  .player .meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .player .title-en {
    font-family: var(--cn);
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .player .status .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(220, 245, 200, 0.85);
    box-shadow: 0 0 8px rgba(220, 245, 200, 0.6);
    animation: dotPulse 2.6s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* mini spectrum — 4 thin bars */
  .spectrum {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 16px;
    width: 28px;
    flex-shrink: 0;
    opacity: 0.4;
    transition: opacity 1.2s ease;
  }
  .player.playing .spectrum { opacity: 0.9; }
  .spectrum span {
    flex: 1;
    background: var(--ink);
    border-radius: 1px;
    height: 35%;
  }
  .player.playing .spectrum span {
    animation: bar 1.6s ease-in-out infinite;
  }
  .player.playing .spectrum span:nth-child(2) { animation-delay: -0.4s; }
  .player.playing .spectrum span:nth-child(3) { animation-delay: -0.8s; }
  .player.playing .spectrum span:nth-child(4) { animation-delay: -1.2s; }
  @keyframes bar {
    0%, 100% { height: 25%; }
    50%      { height: 95%; }
  }

  .play-btn {
    flex-shrink: 0;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.12);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 1s ease, border-color 1s ease;
  }
  .play-btn:hover { background: rgba(255, 255, 255, 0.22); }
  .play-btn svg { width: 12px; height: 12px; fill: var(--ink); }

  /* ---------- Gyro / Mood — small text links under fs ---------- */
  .mini-actions {
    position: absolute;
    top: calc(var(--safe-top) + 130px);
    right: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }
  .mini-link {
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-faint);
    padding: 4px 0;
    transition: color 1.2s ease;
  }
  .mini-link::before { content: '·  '; color: var(--hair); }
  .mini-link:hover { color: var(--ink); }
  .mini-link.active { color: var(--ink); }

  /* ---------- Vignette ---------- */
  .vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255, 230, 150, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at center, transparent 60%, rgba(30, 50, 20, 0.30) 100%);
    transition: opacity 1.5s ease;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    top: calc(var(--safe-top) + 60px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    padding: 10px 22px;
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--hair);
    border-radius: 999px;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink);
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    transition: opacity 1s ease, transform 1s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint { display: none; }

  /* ============================================================
     Mobile — iPhone 15 Pro priority (393×852)
     ============================================================ */
  @media (max-width: 768px) {
    .masthead {
      top: calc(var(--safe-top) + 30px);
      left: 26px;
    }
    .masthead .eyebrow { font-size: 10px; letter-spacing: 0.36em; margin-bottom: 18px; color: rgba(255,255,255,0.78); }
    .masthead .eyebrow::before { width: 24px; background: rgba(255,255,255,0.42); }
    .masthead h1 {
      font-size: clamp(40px, 13vw, 56px);
      letter-spacing: 0.16em;
      margin-bottom: 12px;
    }
    .masthead .cn { font-size: 14px; letter-spacing: 0.46em; color: rgba(255,255,255,0.85); }
    .masthead .rule { margin-top: 22px; width: 44px; background: rgba(255,255,255,0.42); }
    .masthead .caption {
      display: block;
      font-size: 12px;
      letter-spacing: 0.22em;
      line-height: 2;
      color: rgba(255,255,255,0.66);
      max-width: 240px;
      margin-top: 18px;
    }

    .fs {
      top: calc(var(--safe-top) + 30px);
      right: 26px;
      gap: 10px;
    }
    .fs .ring { width: 50px; height: 50px; background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.42); }
    .fs .ring svg { width: 17px; height: 17px; stroke: rgba(255,255,255,0.95); }
    .fs .label { font-size: 11px; letter-spacing: 0.36em; color: rgba(255,255,255,0.82); }

    .mini-actions {
      top: calc(var(--safe-top) + 118px);
      right: 26px;
      gap: 14px;
    }
    .mini-link { font-size: 11px; letter-spacing: 0.34em; color: rgba(255,255,255,0.66); }
    .mini-link::before { color: rgba(255,255,255,0.42); }

    .breathe {
      left: 26px;
      bottom: calc(var(--safe-bottom) + 240px);
      gap: 18px;
    }
    .breathe .label-en { font-size: 13px; letter-spacing: 0.42em; color: rgba(255,255,255,0.95); }
    .breathe .label-cn { font-size: 11px; letter-spacing: 0.42em; color: rgba(255,255,255,0.6); margin-top: -6px; }
    .orb { width: 72px; height: 72px; margin-top: 8px; }

    .enter {
      left: 26px;
      bottom: calc(var(--safe-bottom) + 124px);
      column-gap: 18px;
    }
    .enter .num { font-size: 62px; padding-right: 18px; }
    .enter .en { font-size: 11px; letter-spacing: 0.38em; color: rgba(255,255,255,0.78); }
    .enter .cn { font-size: 14px; letter-spacing: 0.28em; gap: 12px; color: rgba(255,255,255,0.95); }
    .enter .arrow { font-size: 17px; }

    /* mobile player: ~72vw, centered, ~74px tall — permanently visible */
    .player {
      left: 50%;
      right: auto;
      margin-left: 0;
      bottom: calc(var(--safe-bottom) + 32px);
      width: 72vw;
      max-width: 360px;
      min-width: 260px;
      height: 74px;
      padding: 0 14px 0 18px;
      gap: 13px;
      border-color: rgba(255,255,255,0.32);
      animation: playerFloatMobile 9s ease-in-out infinite;
    }
    @keyframes playerFloatMobile {
      0%, 100% { transform: translate(-50%, 0); }
      50%      { transform: translate(-50%, -4px); }
    }
    .player .title-en { font-size: 12px; letter-spacing: 0.22em; color: rgba(255,255,255,0.95); }
    .player .status { font-size: 10px; letter-spacing: 0.28em; color: rgba(255,255,255,0.65); }
    .player .note-icon { width: 20px; height: 20px; opacity: 0.95; }
    .spectrum { width: 24px; height: 15px; }
    .play-btn { width: 40px; height: 40px; border-color: rgba(255,255,255,0.6); }
    .play-btn svg { width: 12px; height: 12px; }

    /* mobile mood toggle gets a small adjustment when player anchored center */
    /* Keep player float subtler on mobile to avoid horizontal drift */
  }

  @media (max-width: 380px) {
    .masthead h1 { font-size: clamp(38px, 13.5vw, 52px); letter-spacing: 0.14em; }
    .masthead .caption { font-size: 11px; }
    .enter .num { font-size: 54px; }
    .enter .cn { font-size: 13px; }
    .breathe { bottom: calc(var(--safe-bottom) + 230px); }
    .player {
      width: 84vw;
      height: 70px;
    }
    .player .title-en { font-size: 11px; }
  }

  @media (max-height: 480px) and (orientation: landscape) {
    .masthead h1 { font-size: 32px; }
    .masthead .caption { display: none; }
    .breathe { display: none; }
    .enter .num { font-size: 42px; }
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<audio id="bgm" loop preload="auto" crossorigin="anonymous"></audio>

<div id="ui">

  <!-- TOP LEFT — masthead -->
  <header class="masthead">
    <div class="eyebrow">Volume I · A Quiet Place</div>
    <h1>Sanctuary</h1>
    <div class="cn">安 全 岛</div>
    <div class="rule"></div>
    <div class="caption">呼 吸 · 聆 听 · 安 住<br/>Breathe · Listen · Be Held</div>
  </header>

  <!-- TOP RIGHT — fullscreen entry -->
  <button class="fs" id="fsBtn" aria-label="Fullscreen">
    <span class="ring">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 9 V4 H9"   stroke-linecap="round"/>
        <path d="M15 4 H20 V9" stroke-linecap="round"/>
        <path d="M20 15 V20 H15" stroke-linecap="round"/>
        <path d="M9 20 H4 V15" stroke-linecap="round"/>
      </svg>
    </span>
    <span class="label" id="fsLabel">全 屏 体 验</span>
  </button>

  <!-- Mini text actions under fs -->
  <div class="mini-actions">
    <button class="mini-link" id="gyroBtn">开 启 体 感</button>
    <button class="mini-link" id="moodBtn">黄 昏 时 分</button>
  </div>

  <!-- LEFT MID — breathing orb -->
  <div class="breathe">
    <div class="label-en">Breathe</div>
    <div class="label-cn">跟 随 呼 吸</div>
    <div class="orb">
      <div class="halo2"></div>
      <div class="halo"></div>
      <div class="core"></div>
    </div>
  </div>

  <!-- LEFT BOTTOM — editorial enter button -->
  <button class="enter" id="musicBtn" aria-label="Enter Sanctuary">
    <div class="num">01</div>
    <div class="meta">
      <div class="en">Enter Sanctuary</div>
      <div class="cn"><span id="enterCn">进 入 安 全 岛</span><span class="arrow">→</span></div>
    </div>
  </button>

  <!-- BOTTOM RIGHT — floating player -->
  <div class="player" id="player">
    <svg class="note-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M9 18 V6 L19 4 V16"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6.5" cy="18" r="2.5" stroke-linecap="round"/>
      <circle cx="16.5" cy="16" r="2.5" stroke-linecap="round"/>
    </svg>
    <div class="meta">
      <div class="title-en">森 林 小 溪 · 白 噪 音</div>
      <div class="status"><span class="dot"></span><span id="playerStatus">Paused · 待 播 放</span></div>
    </div>
    <div class="spectrum" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <button class="play-btn" id="playBtn" aria-label="Play">
      <svg id="playIcon" viewBox="0 0 12 12"><path d="M2 1 L11 6 L2 11 Z"/></svg>
    </button>
  </div>

</div>

<div class="vignette" id="vignette"></div>
<div class="hint" id="hint">点 击 进 入 安 全 岛</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
/* ============================================================
   Sanctuary · 安全岛
   Portrait-first forest creek · Three.js + GSAP
   ============================================================ */

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || innerWidth < 768;
const isPortrait = innerHeight > innerWidth;

/* ---------- Scene ---------- */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc8e6a8, 0.024);

function radialTex(stops) {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  stops.forEach(s => g.addColorStop(s[0], s[1]));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
}

/* ============================================================
   Stream — natural forest creek
   Wider, softer, translucent. Curve smoothed; bank is feathered.
   ============================================================ */
const streamCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(-22,  0.02, -36),
  new THREE.Vector3(-17,  0.02, -28),
  new THREE.Vector3(-12,  0.02, -20),
  new THREE.Vector3( -7,  0.02, -13),
  new THREE.Vector3( -2,  0.02,  -8),
  new THREE.Vector3(  3,  0.02,  -4),
  new THREE.Vector3(  9,  0.02,  -1),
  new THREE.Vector3( 15,  0.02,   3),
  new THREE.Vector3( 22,  0.02,   7),
  new THREE.Vector3( 30,  0.02,  11),
  new THREE.Vector3( 38,  0.02,  15),
], false, 'catmullrom', 0.35);  // lower tension → smoother arcs, no sharp bends

const curveSamples = streamCurve.getPoints(320);

/* Ribbon builder — uses world-space coords directly so shaders can
   read true X/Z for flow. Width may vary along t. */
function buildRibbon(curve, segments, widthFn, yFn) {
  const positions = [];
  const uvs = [];
  const indices = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const p = curve.getPointAt(t);
    const tan = curve.getTangentAt(t);
    const perp = new THREE.Vector3(-tan.z, 0, tan.x).normalize();
    const w = widthFn(t);
    const y = yFn ? yFn(t) : p.y;
    const left  = p.clone().addScaledVector(perp,  w * 0.5);
    const right = p.clone().addScaledVector(perp, -w * 0.5);
    left.y = right.y = y;
    positions.push(left.x, left.y, left.z, right.x, right.y, right.z);
    uvs.push(0, t * 12, 1, t * 12);
  }
  for (let i = 0; i < segments; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    indices.push(a, c, b, b, c, d);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  g.setIndex(indices);
  g.computeVertexNormals();
  return g;
}

function distToStream(x, z) {
  let min = Infinity;
  for (let i = 0; i < curveSamples.length - 1; i++) {
    const ax = curveSamples[i].x,   az = curveSamples[i].z;
    const bx = curveSamples[i+1].x, bz = curveSamples[i+1].z;
    const dx = bx - ax, dz = bz - az;
    const len2 = dx * dx + dz * dz || 1;
    let t = ((x - ax) * dx + (z - az) * dz) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = ax + t * dx, pz = az + t * dz;
    const d2 = (px - x) * (px - x) + (pz - z) * (pz - z);
    if (d2 < min) min = d2;
  }
  return Math.sqrt(min);
}

/* ---- Width functions (organic, low frequency) ---- */
function streamW(t) {
  // base 3.4 widening to ~4.2 mid-arcs, plus smooth low-freq variation
  return 3.4
    + Math.sin(t * 5.1) * 0.45
    + Math.sin(t * 11.2 + 1.3) * 0.22;
}

/* ---- LAYER 4: water surface — translucent, flowing, soft edges ---- */
const waterUniforms = {
  uTime:    { value: 0 },
  uShallow: { value: new THREE.Color(0xd4ece4) }, // very pale aqua at edges
  uMid:     { value: new THREE.Color(0x9ccab8) }, // soft sage middle
  uDeep:    { value: new THREE.Color(0x4f7a6d) }, // deeper at center
  uSky:     { value: new THREE.Color(0xd6e9ee) },
  uSun:     { value: new THREE.Color(0xfff0cc) },
};
const waterMat = new THREE.ShaderMaterial({
  uniforms: waterUniforms,
  transparent: true,
  depthWrite: false,
  vertexShader: `
    uniform float uTime;
    varying vec2  vUv;
    varying vec3  vPosW;
    varying float vRipple;
    void main() {
      vUv = uv;
      vec3 p = position;
      // very gentle ripples — slow & low amplitude
      float r =
          sin(p.x * 0.45 + uTime * 0.16) * 0.012
        + cos(p.z * 0.55 - uTime * 0.13) * 0.010
        + sin((p.x + p.z) * 0.30 + uTime * 0.09) * 0.007;
      p.y += r;
      vRipple = r;
      vec4 wp = modelMatrix * vec4(p, 1.0);
      vPosW = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    varying vec2  vUv;
    varying vec3  vPosW;
    varying float vRipple;
    uniform float uTime;
    uniform vec3 uShallow;
    uniform vec3 uMid;
    uniform vec3 uDeep;
    uniform vec3 uSky;
    uniform vec3 uSun;

    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p){
      vec2 i = floor(p); vec2 f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
    }
    float fbm(vec2 p){
      float v = 0.0; float a = 0.5;
      for (int i = 0; i < 4; i++) {
        v += a * noise(p);
        p *= 2.0; a *= 0.5;
      }
      return v;
    }

    void main() {
      // Cross-section "depth": 0 at edges, 1 at center
      float center = 1.0 - abs(vUv.x - 0.5) * 2.0;
      float depth  = smoothstep(0.0, 1.0, center);

      // 3-stop depth gradient: shallow → mid → deep
      vec3 base = mix(uShallow, uMid, smoothstep(0.0, 0.5, depth));
      base      = mix(base, uDeep, smoothstep(0.5, 1.0, depth) * 0.85);

      // Flowing UV — water moves along the ribbon (down the v-axis)
      vec2 flowUV1 = vec2(vPosW.x * 0.18, vPosW.z * 0.18 - uTime * 0.06);
      vec2 flowUV2 = vec2(vPosW.x * 0.45 + uTime * 0.04,
                          vPosW.z * 0.45 - uTime * 0.10);
      float n1 = fbm(flowUV1);
      float n2 = fbm(flowUV2);

      // Mix in sky reflection on top of base — stronger on shallow zone
      float skyMix = (0.30 + 0.25 * n1) * (0.45 + 0.55 * (1.0 - depth));
      base = mix(base, uSky, skyMix * 0.55);

      // Subtle caustic shimmer (NOT bright sparkles)
      float caustic = pow(n2, 2.2) * 0.45;
      base += caustic * uSun * 0.18;

      // Tiny ripple highlight — barely perceptible
      base += vRipple * uSun * 0.5;

      // Edge feathering — soft transition to bank
      float edgeFade = smoothstep(0.0, 0.30, vUv.x) * smoothstep(1.0, 0.70, vUv.x);

      // Translucency varies with depth: shallow ~ 0.55, deep ~ 0.88
      float alpha = mix(0.55, 0.88, depth) * (0.55 + 0.45 * edgeFade);

      gl_FragColor = vec4(base, alpha);
    }
  `,
});

const waterGeo = buildRibbon(streamCurve, 320,

const grassUniforms = {
  uTime:     { value: 0 },
  uWind:     { value: 1.0 },
  uSunColor: { value: new THREE.Color(0xfff2c0) },
};
const grassMat = new THREE.ShaderMaterial({
  uniforms: grassUniforms,
  side: THREE.DoubleSide,
  vertexShader: `
    uniform float uTime;
    uniform float uWind;
    varying float vY;
    varying vec3  vWPos;
    void main() {
      vec3 pos = position;
      vec4 world = instanceMatrix * vec4(pos, 1.0);
      float t = uTime;
      float wave =
        sin(t * 0.9 + world.x * 0.32 + world.z * 0.28) * 0.32 +
        sin(t * 1.6 + world.z * 0.55) * 0.13;
      float side = cos(t * 0.7 + world.x * 0.22) * 0.16;
      float tip = pow(uv.y, 1.7);
      world.x += wave * tip * uWind;
      world.z += side * tip * uWind;
      vY = uv.y;
      vWPos = world.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * world;
    }
  `,
  fragmentShader: `
    varying float vY;
    varying vec3 vWPos;
    uniform vec3 uSunColor;
    void main() {
      // fresh sunlit green: deep base → bright lime → sun-kissed tip
      vec3 bottom = vec3(0.20, 0.32, 0.12);
      vec3 mid    = vec3(0.43, 0.66, 0.24);
      vec3 top    = mix(vec3(0.74, 0.86, 0.42), uSunColor, 0.35);
      vec3 col = mix(bottom, mid, smoothstep(0.0, 0.55, vY));
      col = mix(col, top, smoothstep(0.5, 1.0, vY));
      col += uSunColor * 0.16 * pow(vY, 5.0);
      // mild fog blend
      float d = length(vWPos.xz);
      col = mix(col, vec3(0.82, 0.92, 0.72), smoothstep(22.0, 70.0, d) * 0.55);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

/* ============================================================
   Trees & bushes — green, layered
   ============================================================ */
function makeTree(x, z) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.26, 1.6, 7),
    new THREE.MeshStandardMaterial({ color: 0x5e3a1f, roughness: 1 })
  );
  trunk.position.y = 0.8;
  g.add(trunk);

  // fresh green leaves (hue 0.24–0.32 → yellow-green to green)
  const hue = 0.24 + Math.random() * 0.08;
  const sat = 0.5 + Math.random() * 0.2;
  const lig = 0.36 + Math.random() * 0.1;
  const leafMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(hue, sat, lig),
    roughness: 0.92,
  });

  const layers = 3 + Math.floor(Math.random() * 2);
  for (let i = 0; i < layers; i++) {
    const r = 1.35 - i * 0.28;
    const h = 2.2 - i * 0.35;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h, 9), leafMat);
    cone.position.y = 2.0 + i * 0.85;
    cone.rotation.y = Math.random() * Math.PI;
    g.add(cone);
  }
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  g.scale.setScalar(0.95 + Math.random() * 0.9);
  return g;
}

/* ---------- Tree placement: composed, layered, side-banded ----------
   Goal: dense forest hug on left/right + a far layer behind,
   while keeping the stream corridor open. Not random scatter. */

function tryAddTree(x, z, minStreamDist = 4.0, minCamDist = 9) {
  if (distToStream(x, z) < minStreamDist) return false;
  if (Math.sqrt(x * x + (z + 4) * (z + 4)) < minCamDist) return false;
  scene.add(makeTree(x, z));
  return true;
}

// LAYER A — close side bands. Wraps the viewer.
// Mobile: +40%, Desktop: -15% from previous.
const NEAR_PER_SIDE = isMobile ? 31 : 32;
for (let side = -1; side <= 1; side += 2) {
  let placed = 0, tries = 0;
  while (placed < NEAR_PER_SIDE && tries++ < NEAR_PER_SIDE * 6) {
    const xBase = side * (7 + Math.random() * 18);
    const z = -8 - Math.random() * 28;
    const jitter = (Math.random() - 0.5) * 4;
    if (tryAddTree(xBase + jitter, z, 4.0, 9)) placed++;
  }
}

// LAYER B — far backdrop band
const FAR_COUNT = isMobile ? 39 : 39;
for (let i = 0; i < FAR_COUNT; i++) {
  const x = (Math.random() - 0.5) * 140;
  const z = -42 - Math.random() * 18;
  if (distToStream(x, z) < 2.4) continue;
  const t = makeTree(x, z);
  t.scale.multiplyScalar(0.85);
  scene.add(t);
}

// LAYER C — foreground accents flanking the viewer
const FRONT_COUNT = isMobile ? 11 : 12;
for (let i = 0; i < FRONT_COUNT; i++) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const x = side * (14 + Math.random() * 22);
  const z = 4 + Math.random() * 10;
  tryAddTree(x, z, 4.0, 6);
}

// LAYER D (mobile only) — extra trees ahead of the stream to hug horizon
if (isMobile) {
  for (let i = 0; i < 14; i++) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const x = side * (10 + Math.random() * 16);
    const z = -20 - Math.random() * 14;
    tryAddTree(x, z, 4.0, 8);
  }
}

function makeBush(x, z) {
  const g = new THREE.Group();
  const hue = 0.26 + Math.random() * 0.06;
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(hue, 0.5, 0.4),
    roughness: 0.95,
  });
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const s = 0.32 + Math.random() * 0.42;
    const b = new THREE.Mesh(new THREE.IcosahedronGeometry(s, 0), mat);
    b.position.set((Math.random() - 0.5) * 0.7, s * 0.55, (Math.random() - 0.5) * 0.7);
    g.add(b);
  }
  g.position.set(x, 0, z);
  return g;
}

const BUSH_COUNT = isMobile ? 18 : 26;
for (let i = 0; i < BUSH_COUNT; i++) {
  const t = 0.05 + Math.random() * 0.9;

  const tan = streamCurve.getTangentAt(t).normalize();
  const perp = new THREE.Vector3(-tan.z, 0, tan.x);
  const side = Math.random() > 0.5 ? 1 : -1;
  const off = (1.4 + Math.random() * 1.0) * side;
  scene.add(makeBush(p.x + perp.x * off, p.z + perp.z * off));
}

/* ============================================================
   Atmosphere — pollen / dust / dandelion + god rays
   ============================================================ */
function makeParticleSystem(opts) {
  const { count, area, yRange, size, color, tex, blend, speed } = opts;
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3);
  const phase = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    pos[i * 3]     = (Math.random() - 0.5) * area;
    pos[i * 3 + 1] = yRange[0] + Math.random() * (yRange[1] - yRange[0]);
    pos[i * 3 + 2] = (Math.random() - 0.5) * area - 4;
    vel[i * 3]     = (Math.random() - 0.5) * speed.x;
    vel[i * 3 + 1] = speed.y[0] + Math.random() * (speed.y[1] - speed.y[0]);
    vel[i * 3 + 2] = (Math.random() - 0.5) * speed.x;
    phase[i] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({

  });
  return { points: new THREE.Points(geo, mat), pos, vel, phase, count, area, yRange };
}

function makeGodRay(width, height) {
  const geo = new THREE.PlaneGeometry(width, height);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms: {
      uTime:      { value: 0 },
      uColor:     { value: new THREE.Color(0xffe6b0) },
      uIntensity: { value: 0.22 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    `,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uIntensity;
      void main() {
        float v = 1.0 - vUv.y;
        float h = 1.0 - abs(vUv.x - 0.5) * 2.0;
        h = smoothstep(0.0, 1.0, h);
        float a = pow(h * v, 1.7) * uIntensity;
        a *= 0.85 + sin(uTime * 0.4 + vUv.x * 5.0 + vUv.y * 3.0) * 0.15;
        gl_FragColor = vec4(uColor, a);
      }
    `,
  });
  return new THREE.Mesh(geo, mat);
}

/* ============================================================
   Audio — HTML5 nature loop (primary) + WebAudio noise (fallback)
   ============================================================ */
/* Replace ./forest-stream.mp3 with your own asset for guaranteed playback.
   We try the local file first, then a CDN fallback. */
const BGM_SOURCES = [
  './forest-stream.mp3',
  'https://cdn.pixabay.com/audio/2022/03/15/audio_8cb749cba2.mp3',
];
const bgm = document.getElementById('bgm');
bgm.crossOrigin = 'anonymous';
bgm.volume = 0;

let bgmSourceIdx = 0;
let bgmLoadedOk = false;
function setBgmSource(idx) {
  bgmSourceIdx = idx;
  bgm.src = BGM_SOURCES[idx];
  bgm.load();
}
setBgmSource(0);

bgm.addEventListener('canplay',  () => { bgmLoadedOk = true; });
bgm.addEventListener('error', () => {
  bgmLoadedOk = false;
  if (bgmSourceIdx < BGM_SOURCES.length - 1) {
    setBgmSource(bgmSourceIdx + 1);
  }
});

let webAudioCtx = null;
let webAudioMaster = null;
let webAudioNodes = [];
let usingWebAudio = false;

function startWebAudioFallback() {
  if (webAudioCtx) {
    webAudioMaster.gain.cancelScheduledValues(webAudioCtx.currentTime);
    webAudioMaster.gain.linearRampToValueAtTime(0.45, webAudioCtx.currentTime + 3);
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  webAudioCtx = ctx;
  const master = ctx.createGain();
  master.gain.value = 0;
  master.connect(ctx.destination);
  webAudioMaster = master;

  // ---- pink-ish noise buffer ----
  const bufSize = ctx.sampleRate * 4;
  const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < bufSize; i++) {
    const w = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + w * 0.0555179;
    b1 = 0.99332 * b1 + w * 0.0750759;
    b2 = 0.96900 * b2 + w * 0.1538520;
    b3 = 0.86650 * b3 + w * 0.3104856;
    b4 = 0.55000 * b4 + w * 0.5329522;
    b5 = -0.7616 * b5 - w * 0.0168980;
    nd[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.11;
    b6 = w * 0.115926;
  }

  function makeLoop() {
    const src = ctx.createBufferSource();
    src.buffer = noiseBuf;
    src.loop = true;
    return src;
  }

  // ---- soft wind: lowpass-filtered noise with slow LFO on cutoff ----
  const wind = makeLoop();
  const windFilter = ctx.createBiquadFilter();
  windFilter.type = 'lowpass';
  windFilter.frequency.value = 380;
  windFilter.Q.value = 0.6;
  const windGain = ctx.createGain();
  windGain.gain.value = 0.55;
  const windLFO = ctx.createOscillator();
  windLFO.frequency.value = 0.08;
  const windLFOGain = ctx.createGain();
  windLFOGain.gain.value = 180;
  windLFO.connect(windLFOGain).connect(windFilter.frequency);
  wind.connect(windFilter).connect(windGain).connect(master);
  wind.start(); windLFO.start();

  // ---- water: bandpass noise with subtle modulation ----
  const water = makeLoop();
  const waterFilter = ctx.createBiquadFilter();
  waterFilter.type = 'bandpass';
  waterFilter.frequency.value = 1200;
  waterFilter.Q.value = 0.9;
  const waterGain = ctx.createGain();
  waterGain.gain.value = 0.38;
  const waterLFO = ctx.createOscillator();
  waterLFO.frequency.value = 0.5;
  const waterLFOGain = ctx.createGain();
  waterLFOGain.gain.value = 350;
  waterLFO.connect(waterLFOGain).connect(waterFilter.frequency);
  water.connect(waterFilter).connect(waterGain).connect(master);
  water.start(); waterLFO.start();

  // ---- high shimmer: very quiet, like distant insects/leaves ----
  const air = makeLoop();
  const airFilter = ctx.createBiquadFilter();
  airFilter.type = 'highpass';
  airFilter.frequency.value = 4200;
  const airGain = ctx.createGain();
  airGain.gain.value = 0.10;
  air.connect(airFilter).connect(airGain).connect(master);
  air.start();

  // ---- occasional bird chirp (sine blip) ----
  function chirp() {
    if (!webAudioCtx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const baseF = 1800 + Math.random() * 1400;
    osc.frequency.setValueAtTime(baseF, now);
    osc.frequency.exponentialRampToValueAtTime(baseF * (1 + (Math.random()-0.5)*0.4), now + 0.18);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.12, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
    osc.connect(g).connect(master);
    osc.start(now); osc.stop(now + 0.3);
    const next = 6 + Math.random() * 14;
    webAudioNodes.push(setTimeout(chirp, next * 1000));
  }
  webAudioNodes.push(setTimeout(chirp, 3000));

  master.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 3);
}

function stopWebAudioFallback() {
  if (!webAudioCtx) return;
  webAudioMaster.gain.cancelScheduledValues(webAudioCtx.currentTime);
  webAudioMaster.gain.linearRampToValueAtTime(0, webAudioCtx.currentTime + 1.6);
  webAudioNodes.forEach(id => clearTimeout(id));
  webAudioNodes = [];
}

/* ---------- Ambient pad — extremely soft sine drones to layer over BGM ---------- */
let padCtx = null, padGain = null, padOscs = [];
function startAmbientPad() {
  if (padCtx) {
    padGain.gain.cancelScheduledValues(padCtx.currentTime);
    padGain.gain.linearRampToValueAtTime(0.08, padCtx.currentTime + 6);
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  padCtx = ctx;
  const g = ctx.createGain();
  g.gain.value = 0;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 1200;
  lp.Q.value = 0.5;
  g.connect(lp).connect(ctx.destination);
  padGain = g;
  // C major pentatonic-ish stack: C3, G3, E4 — open, "piano pad"-like sine drones
  const freqs = [130.81, 196.00, 329.63];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    osc.detune.value = (Math.random() - 0.5) * 6;
    const vg = ctx.createGain();
    vg.gain.value = 0.33;
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.05 + i * 0.03;
    const lfoG = ctx.createGain();
    lfoG.gain.value = 0.12;
    lfo.connect(lfoG).connect(vg.gain);
    osc.connect(vg).connect(g);
    osc.start(); lfo.start();
    padOscs.push(osc, lfo);
  });
  g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 6);
}
function stopAmbientPad() {
  if (!padCtx) return;
  padGain.gain.cancelScheduledValues(padCtx.currentTime);
  padGain.gain.linearRampToValueAtTime(0, padCtx.currentTime + 2);
}

function fadeInBgm() {
  const target = 0.7;
  const step = () => {
    bgm.volume = Math.min(target, bgm.volume + 0.02);
    if (bgm.volume < target) requestAnimationFrame(step);
  };
  step();
}
function fadeOutBgm() {
  const step = () => {
    bgm.volume = Math.max(0, bgm.volume - 0.03);
    if (bgm.volume > 0) requestAnimationFrame(step);
    else bgm.pause();
  };
  step();
}

async function toggleMusic() {
  if (!state.music) {
    let ok = false;

    // Try real audio first
    try {
      const p = bgm.play();
      if (p !== undefined) await p;
      // play() resolved without throwing → audio is starting
      fadeInBgm();
      usingWebAudio = false;
      ok = true;
    } catch (err) {
      // Could be autoplay block (rare here since user clicked) or network/CORS
      ok = false;
    }

    // If audio failed (e.g. mp3 blocked / offline), fall back to WebAudio noise
    if (!ok) {
      try {
        startWebAudioFallback();
        usingWebAudio = true;
        ok = true;
        toast('使 用 备 用 环 境 音');
      } catch (e2) {
        toast('请 再 次 点 击 播 放');
        return;
      }
    }
    state.music = true;
    setPlayingUI(true);
    startAmbientPad();
    onMusicOn();
  } else {
    if (usingWebAudio) stopWebAudioFallback();
    else fadeOutBgm();
    stopAmbientPad();
    state.music = false;
    setPlayingUI(false);
    onMusicOff();
  }
}

/* ---------- Parallax: pointer / touch / gyroscope ---------- */
let useGyro = false;
let gyroZero = null;

function updateTargets(clientX, clientY) {
  state.targetX = (clientX / innerWidth - 0.5) * 2;
  state.targetY = (clientY / innerHeight - 0.5) * 2;
}
window.addEventListener('pointermove', (e) => { if (!useGyro) updateTargets(e.clientX, e.clientY); });
window.addEventListener('touchmove', (e) => {
  if (useGyro) return;
  const t = e.touches[0];
  if (t) updateTargets(t.clientX, t.clientY);
}, { passive: true });

function handleOrientation(e) {
  if (e.beta == null || e.gamma == null) return;
  if (!gyroZero) gyroZero = { beta: e.beta, gamma: e.gamma };
  const dg = e.gamma - gyroZero.gamma;
  const db = e.beta  - gyroZero.beta;
  state.targetX = Math.max(-0.6, Math.min(0.6, dg / 30));
  state.targetY = Math.max(-0.25, Math.min(0.25, db / 30));
}

const gyroBtn = document.getElementById('gyroBtn');
const hasGyro = 'DeviceOrientationEvent' in window;
if (!hasGyro) {
  gyroBtn.disabled = true;
  gyroBtn.style.opacity = 0.5;
  gyroBtn.textContent = '无 体 感';
}
gyroBtn.addEventListener('click', async () => {
  if (!hasGyro) { toast('当 前 设 备 不 支 持 体 感'); return; }
  if (useGyro) {
    window.removeEventListener('deviceorientation', handleOrientation);
    useGyro = false;
    gyroZero = null;
    gyroBtn.textContent = '开 启 体 感';
    gyroBtn.classList.remove('active');
    return;
  }
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') { toast('未 授 权 体 感'); return; }
    } catch (err) { toast('授 权 失 败'); return; }
  }
  window.addEventListener('deviceorientation', handleOrientation);
  useGyro = true;
  gyroBtn.textContent = '已 启 用 体 感';
  gyroBtn.classList.add('active');
  toast('轻 轻 转 动 手 机');
});

/* ---------- Fullscreen ---------- */
const fsBtn = document.getElementById('fsBtn');

const fsLabel = document.getElementById('fsLabel');

function isFs() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}
async function enterFs() {
  const el = document.documentElement;
  try {
    if (el.requestFullscreen)      await el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else throw new Error('unsupported');
    fsLabel.textContent = '退 出 全 屏';
  } catch (err) {
    toast('当 前 浏 览 器 不 支 持 全 屏');
  }
}
async function exitFs() {
  try {
    if (document.exitFullscreen)         await document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } catch (err) { /* noop */ }
  fsLabel.textContent = '全 屏 体 验';
}
fsBtn.addEventListener('click', () => { if (isFs()) exitFs(); else enterFs(); });
document.addEventListener('fullscreenchange', () => {
  fsLabel.textContent = isFs() ? '退 出 全 屏' : '全 屏 体 验';
});
document.addEventListener('webkitfullscreenchange', () => {
  fsLabel.textContent = isFs() ? '退 出 全 屏' : '全 屏 体 验';
});

/* ---------- UI entry animations (slow, editorial) ---------- */
gsap.from('.masthead',     { opacity: 0, y: -16, duration: 2.4, delay: 0.4, ease: 'power2.out' });
gsap.from('.fs',           { opacity: 0, y: -16, duration: 2.4, delay: 0.6, ease: 'power2.out' });
gsap.from('.mini-actions', { opacity: 0, x:  16, duration: 2.4, delay: 1.0, ease: 'power2.out' });
gsap.from('.breathe',      { opacity: 0, x: -20, duration: 2.4, delay: 1.2, ease: 'power2.out' });
gsap.from('.enter',        { opacity: 0, y:  20, duration: 2.4, delay: 1.4, ease: 'power2.out' });
gsap.from('.player',       { opacity: 0, duration: 2.4, delay: 1.6, ease: 'power2.out' });

/* ---------- Resize ---------- */
function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.fov = (innerHeight > innerWidth) ? 64 : 54;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  setVh();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 200));

/* ============================================================
   Animate
   ============================================================ */
const clock = new THREE.Clock();
const camBase = new THREE.Vector3(0, 5.2, 13);
const camLookAt = new THREE.Vector3(0, 1.4, -8);

function updateParticleSystem(ps, t) {
  const arr = ps.points.geometry.attributes.position.array;
  const halfA = ps.area / 2;
  const speedMul = state.particleSpeed;
  for (let i = 0; i < ps.count; i++) {
    arr[i * 3]     += ps.vel[i * 3]     * speedMul + Math.sin(t * 0.5 + ps.phase[i]) * 0.0018;
    arr[i * 3 + 1] += ps.vel[i * 3 + 1] * speedMul;
    arr[i * 3 + 2] += ps.vel[i * 3 + 2] * speedMul + Math.cos(t * 0.4 + ps.phase[i]) * 0.0014;
    if (arr[i * 3 + 1] > ps.yRange[1]) arr[i * 3 + 1] = ps.yRange[0];
    if (arr[i * 3]     >  halfA) arr[i * 3]     = -halfA;
    if (arr[i * 3]     < -halfA) arr[i * 3]     =  halfA;
    if (arr[i * 3 + 2] >  halfA - 4) arr[i * 3 + 2] = -halfA - 4;
    if (arr[i * 3 + 2] < -halfA - 4) arr[i * 3 + 2] =  halfA - 4;
  }
  ps.points.geometry.attributes.position.needsUpdate = true;
}

function animate() {
  const t = clock.getElapsedTime();

  grassUniforms.uTime.value = t;
  waterUniforms.uTime.value = t;

  updateParticleSystem(pollen, t);
  updateParticleSystem(dust, t);
  updateParticleSystem(dandelion, t);

  for (const r of godRays) {
    const dx = camera.position.x - r.position.x;
    const dz = camera.position.z - r.position.z;
    r.rotation.y = Math.atan2(dx, dz);
    r.material.uniforms.uTime.value = t;
    r.material.uniforms.uIntensity.value = r.userData.baseIntensity + state.rayBoost;
  }

  state.mouseX += (state.targetX - state.mouseX) * 0.03;
  state.mouseY += (state.targetY - state.mouseY) * 0.03;

  camera.position.x = camBase.x + Math.sin(t * 0.08) * 0.45 + state.mouseX * 0.7;
  camera.position.y = camBase.y + Math.sin(t * 0.10) * 0.18 - state.mouseY * 0.25;
  camera.position.z = camBase.z + Math.cos(t * 0.06) * 0.3;
  camera.lookAt(camLookAt);

  const pulse = 28 + Math.sin(t * 0.18) * 0.7;
  sunGlow.scale.set(pulse, pulse, 1);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
