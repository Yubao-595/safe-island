<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#7cbf68" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>安全岛 · Sanctuary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+SC:wght@200;300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #cfe7b0;
    font-family: 'Inter', -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
    color: rgba(255,255,255,0.92);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    font-weight: 300;
  }
  :root {
    --vh: 1vh;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --cn: 'Noto Serif SC', "PingFang SC", "Hiragino Sans GB", sans-serif;
    --ink: rgba(255, 255, 255, 0.92);
    --ink-soft: rgba(255, 255, 255, 0.66);
    --ink-faint: rgba(255, 255, 255, 0.40);
    --hair: rgba(255, 255, 255, 0.28);
    --glass: rgba(255, 255, 255, 0.08);
    --glass-strong: rgba(255, 255, 255, 0.12);
  }
  #scene {
    display: block;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    height: calc(var(--vh) * 100);
  }

  /* ---------- Overlay root ---------- */
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  #ui > * { pointer-events: auto; }

  /* ---------- TOP LEFT — editorial masthead ---------- */
  .masthead {
    position: absolute;
    top: calc(var(--safe-top) + 56px);
    left: 36px;
    pointer-events: none;
    text-align: left;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(34px, 7.5vw, 56px);
    letter-spacing: 0.22em;
    line-height: 1;
    color: rgba(255, 255, 255, 0.92);
    text-transform: uppercase;
    margin: 0 0 18px -2px;
    text-shadow: 0 1px 12px rgba(20, 40, 20, 0.22);
  }
  .masthead .cn {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 13px;
    letter-spacing: 0.55em;
    color: rgba(255, 255, 255, 0.74);
    padding-left: 3px;
    margin-bottom: 30px;
    text-shadow: 0 1px 10px rgba(20, 40, 20, 0.22);
  }
  .masthead .caption {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.42em;
    color: rgba(255, 255, 255, 0.46);
    padding-left: 3px;
    text-shadow: 0 1px 10px rgba(20, 40, 20, 0.22);
  }

  /* Right-top handle — same typography as masthead caption */
  .ig-handle {
    position: absolute;
    top: calc(var(--safe-top) + 56px);
    right: 36px;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.42em;
    color: rgba(255, 255, 255, 0.46);
    text-shadow: 0 1px 10px rgba(20, 40, 20, 0.22);
    pointer-events: none;
    white-space: nowrap;
  }

  /* Hide deprecated controls completely */
  .legacy-hidden {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
    pointer-events: none;
    opacity: 0;
  }

  /* ---------- Breathing orb ----------
     Natural breath: 4s inhale → 6s exhale → 10s cycle.
     Orb scales 0.80 → 1.10. Halo rings echo at slightly larger amplitude.
     Phase label crossfades between 吸气 / 呼气. */
  .breath-orb {
    position: absolute;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .breath-orb .core,
  .breath-orb .ring {
    position: absolute;
    border-radius: 50%;
    will-change: transform, opacity;
  }
  .breath-orb .core {
    width: 56%;
    height: 56%;
    background: radial-gradient(
      circle at 38% 36%,
      rgba(255, 255, 255, 0.85) 0%,
      rgba(255, 255, 255, 0.45) 38%,
      rgba(255, 255, 255, 0.12) 70%,
      rgba(255, 255, 255, 0) 100%
    );
    box-shadow: 0 0 48px rgba(255, 255, 255, 0.25);
    animation: breathCore 10s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }
  .breath-orb .ring-1 {
    width: 72%; height: 72%;
    border: 1px solid rgba(255, 255, 255, 0.45);
    animation: breathRing 10s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }
  .breath-orb .ring-2 {
    width: 86%; height: 86%;
    border: 1px solid rgba(255, 255, 255, 0.30);
    animation: breathRing 10s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    animation-delay: 0.4s;
  }
  .breath-orb .ring-3 {
    width: 100%; height: 100%;
    border: 1px solid rgba(255, 255, 255, 0.18);
    animation: breathRing 10s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    animation-delay: 0.8s;
  }
  .breath-orb .phase {
    position: absolute;
    bottom: -38px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--cn);
    font-weight: 200;
    font-size: 12px;
    letter-spacing: 0.5em;
    color: rgba(255, 255, 255, 0.62);
    text-shadow: 0 1px 10px rgba(20, 40, 20, 0.22);
    padding-left: 4px;
    white-space: nowrap;
    transition: opacity 0.6s ease;
  }

  @keyframes breathCore {
    /* Inhale 0-40% (4s out of 10s), exhale 40-100% (6s) */
    0%   { transform: scale(0.80); opacity: 0.75; }
    40%  { transform: scale(1.10); opacity: 1; }
    100% { transform: scale(0.80); opacity: 0.75; }
  }
  @keyframes breathRing {
    0%   { transform: scale(0.78); opacity: 0.15; }
    40%  { transform: scale(1.18); opacity: 0.85; }
    100% { transform: scale(0.78); opacity: 0.15; }
  }

  @media (max-width: 768px) {
    .breath-orb { width: 170px; height: 170px; top: 52%; }
    .breath-orb .phase { font-size: 11px; letter-spacing: 0.46em; bottom: -32px; }
  }
  @media (max-width: 380px) {
    .breath-orb { width: 150px; height: 150px; }
  }

  body.pre-entry .breath-orb {
    opacity: 0;
    pointer-events: none;
  }

  /* ---------- TOP RIGHT — fullscreen "art entry" ---------- */
  .fs {
    position: absolute;
    top: calc(var(--safe-top) + 38px);
    right: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    background: transparent;
    border: none;
    color: inherit;
    font-family: inherit;
    padding: 0;
  }
  .fs .ring {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.42);
    background: rgba(255, 255, 255, 0.16);
    backdrop-filter: blur(32px) saturate(180%) brightness(1.08);
    -webkit-backdrop-filter: blur(32px) saturate(180%) brightness(1.08);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 18px 50px rgba(40, 70, 40, 0.10),
      inset 0 1px 0 rgba(255, 255, 255, 0.55),
      inset 0 -1px 0 rgba(255, 255, 255, 0.12);
    transition: background 1.6s ease, border-color 1.6s ease;
  }
  .fs:hover .ring {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.52);
  }
  .fs .ring svg {
    width: 16px; height: 16px;
    stroke: rgba(255, 255, 255, 0.94);
    fill: none;
    stroke-width: 0.85;
    filter: drop-shadow(0 1px 4px rgba(20, 40, 20, 0.18));
  }
  .fs .label {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: rgba(255, 255, 255, 0.62);
    padding-left: 4px;
  }

  /* ---------- LEFT MID — breathing orb block ---------- */
  .breathe {
    position: absolute;
    left: 40px;
    bottom: calc(var(--safe-bottom) + 230px);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 18px;
    pointer-events: none;
  }
  .breathe .label-en {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.42em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .breathe .label-cn {
    font-family: var(--cn);
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-faint);
    margin-top: -10px;
  }
  .orb {
    position: relative;
    width: 78px;
    height: 78px;
    margin-top: 6px;
  }
  .orb .core,
  .orb .halo,
  .orb .halo2 {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .orb .core {
    background: radial-gradient(circle at 38% 38%,
      rgba(255,255,255,0.95) 0%,
      rgba(240,255,225,0.50) 38%,
      rgba(220,245,200,0.0) 72%);
    animation: orbBreathe 11s ease-in-out infinite;
  }
  .orb .halo {
    background: radial-gradient(circle,
      rgba(255,255,255,0.18) 0%,
      rgba(220,245,200,0) 70%);
    transform: scale(1.6);
    animation: orbBreathe 11s ease-in-out infinite;
    animation-delay: -1.5s;
  }
  .orb .halo2 {
    background: radial-gradient(circle,
      rgba(220,245,200,0.10) 0%,
      rgba(220,245,200,0) 70%);
    transform: scale(2.4);
    animation: orbBreathe 11s ease-in-out infinite;
    animation-delay: -3s;
  }
  @keyframes orbBreathe {
    0%, 100% { opacity: 0.45; transform: scale(0.78); }
    50%      { opacity: 1;    transform: scale(1.08); }
  }

  /* ---------- LEFT BOTTOM — "01 ENTER SANCTUARY" ---------- */
  .enter {
    position: absolute;
    left: 40px;
    bottom: calc(var(--safe-bottom) + 36px);
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 22px;
    align-items: end;
    cursor: pointer;
    background: transparent;
    border: none;
    color: inherit;
    font-family: inherit;
    text-align: left;
    padding: 0;
    transition: opacity 1.4s ease;
  }
  .enter:hover { opacity: 0.78; }
  .enter:active { opacity: 0.62; }
  .enter .num {
    position: relative;
    font-family: var(--serif);
    font-weight: 300;
    font-size: 72px;
    line-height: 0.82;
    color: var(--ink);
    letter-spacing: -0.02em;
    padding-right: 22px;
  }
  .enter .num::after {
    content: '';
    position: absolute;
    top: 6px;
    right: 0;
    width: 1px;
    height: calc(100% - 12px);
    background: var(--hair);
  }
  .enter .meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 6px;
  }
  .enter .en {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .enter .cn {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--cn);
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.32em;
    color: var(--ink);
  }
  .enter .arrow {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1;
    transition: transform 1.2s ease;
  }
  .enter:hover .arrow { transform: translateX(6px); }

  /* ---------- Bottom player — iOS Liquid Glass ---------- */
  .player {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 22px);
    z-index: 99999;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 11px 12px 11px 22px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px;
    box-shadow:
      0 6px 24px rgba(0, 0, 0, 0.10);
    min-width: 290px;
    max-width: min(360px, 82vw);
    width: max-content;
    animation: playerFloat 9s ease-in-out infinite;
    will-change: transform;
    pointer-events: auto;
    opacity: 1 !important;
    visibility: visible !important;
    color: rgba(255, 255, 255, 0.92);
  }
  @keyframes playerFloat {
    0%, 100% { transform: translate(-50%, 0); }
    50%      { transform: translate(-50%, -4px); }
  }
  .player .note-icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    stroke: rgba(255, 255, 255, 0.85);
    fill: none;
    stroke-width: 0.9;
  }
  .player .meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .player .title-en {
    font-family: var(--cn);
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.26em;
    color: rgba(255, 255, 255, 0.88);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.30em;
    color: rgba(255, 255, 255, 0.55);
  }
  .player .status .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    transition: background 0.8s ease;
  }
  .player.playing .status .dot {
    background: rgba(255, 255, 255, 0.85);
    animation: dotPulse 2.6s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }

  /* mini spectrum — 4 hairline bars */
  .spectrum {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 16px;
    width: 24px;
    flex-shrink: 0;
    opacity: 0.55;
    transition: opacity 1.2s ease;
  }
  .player.playing .spectrum { opacity: 0.85; }
  .spectrum span {
    flex: 1;
    max-width: 2px;
    background: rgba(255, 255, 255, 0.78);
    border-radius: 1px;
    height: 30%;
  }
  .player.playing .spectrum span {
    animation: bar 1.8s ease-in-out infinite;
  }
  .player.playing .spectrum span:nth-child(2) { animation-delay: -0.45s; }
  .player.playing .spectrum span:nth-child(3) { animation-delay: -0.9s;  }
  .player.playing .spectrum span:nth-child(4) { animation-delay: -1.35s; }
  @keyframes bar {
    0%, 100% { height: 22%; }
    50%      { height: 86%; }
  }

  .play-btn {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 1.2s ease, border-color 1.2s ease;
    box-shadow: none;
    color: rgba(255, 255, 255, 0.92);
  }
  .play-btn:hover {
    background: rgba(255, 255, 255, 0.10);
    border-color: rgba(255, 255, 255, 0.32);
  }
  .play-btn svg {
    width: 11px; height: 11px;
    fill: rgba(255, 255, 255, 0.92);
  }

  /* ---------- Gyro / Mood — small text links under fs ---------- */
  .mini-actions {
    position: absolute;
    top: calc(var(--safe-top) + 130px);
    right: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }
  .mini-link {
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-faint);
    padding: 4px 0;
    transition: color 1.2s ease;
  }
  .mini-link::before { content: '·  '; color: var(--hair); }
  .mini-link:hover { color: var(--ink); }
  .mini-link.active { color: var(--ink); }

  /* ---------- Vignette ---------- */
  .vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255, 230, 150, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at center, transparent 60%, rgba(30, 50, 20, 0.30) 100%);
    transition: opacity 1.5s ease;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    top: calc(var(--safe-top) + 60px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    padding: 10px 22px;
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--hair);
    border-radius: 999px;
    font-family: var(--cn);
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink);
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    transition: opacity 1s ease, transform 1s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint { display: none; }

  /* ============================================================
     Mobile — iPhone 15 Pro priority (393×852)
     ============================================================ */
  @media (max-width: 768px) {
    .masthead {
      top: calc(var(--safe-top) + 36px);
      left: 24px;
    }
    .masthead h1 {
      font-size: clamp(34px, 11vw, 44px);
      letter-spacing: 0.20em;
      margin: 0 0 14px -1px;
    }
    .masthead .cn { font-size: 12px; letter-spacing: 0.55em; margin-bottom: 22px; }
    .masthead .caption { font-size: 10px; letter-spacing: 0.42em; }
    .ig-handle { top: calc(var(--safe-top) + 36px); right: 24px; font-size: 10px; letter-spacing: 0.42em; }

    /* mobile player: airy, capped at 86vw, always visible */
    .player {
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      width: max-content;
      min-width: 280px;
      max-width: 84vw;
      padding: 9px 11px 9px 20px;
      gap: 14px;
      border-color: rgba(255, 255, 255, 0.18);
    }
    .player .title-en { font-size: 12px; letter-spacing: 0.26em; }
    .player .status { font-size: 10px; letter-spacing: 0.28em; }
    .player .note-icon { width: 19px; height: 19px; }
    .spectrum { width: 22px; height: 15px; }
    .play-btn { width: 38px; height: 38px; }
    .play-btn svg { width: 12px; height: 12px; }
  }

  @media (max-width: 380px) {
    .masthead h1 { font-size: clamp(30px, 12vw, 38px); letter-spacing: 0.18em; }
    .masthead .caption { font-size: 9px; }
    .ig-handle { font-size: 9px; letter-spacing: 0.36em; }
    .player {
      max-width: 92vw;
      min-width: 260px;
      padding: 9px 11px 9px 16px;
      gap: 12px;
    }
    .player .title-en { font-size: 11px; }
    .player .status { font-size: 9px; }
  }

  @media (max-height: 480px) and (orientation: landscape) {
    .masthead h1 { font-size: 28px; }
    .masthead .caption { display: none; }
  }

  /* ============================================================
     Entry ceremony — shown before the user enters Sanctuary
     ============================================================ */
  /* Veil: a barely-there soft darkening so the scene reads as "pre-entry" */
  .entry-veil {
    position: fixed;
    inset: 0;
    z-index: 999990;
    background:
      radial-gradient(ellipse at center, rgba(20, 35, 20, 0.18) 0%, rgba(15, 28, 16, 0.42) 80%);
    pointer-events: none;
    transition: opacity 1.8s ease;
  }

  /* CTA wrapper, centered slightly below middle */
  .entry {
    position: fixed;
    left: 50%;
    top: 58%;
    transform: translate(-50%, -50%);
    z-index: 999991;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    transition: opacity 1.6s ease, transform 1.6s ease;
    pointer-events: auto;
  }

  .entry-cta {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    padding: 16px 26px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px;
    cursor: pointer;
    font-family: var(--cn);
    color: rgba(255, 255, 255, 0.92);
    transition: background 1.4s ease, border-color 1.4s ease, transform 0.35s ease, opacity 0.35s ease, filter 0.35s ease;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
    animation: entryBreathe 7s ease-in-out infinite;
  }
  .entry-cta:hover {
    background: rgba(255, 255, 255, 0.10);
    border-color: rgba(255, 255, 255, 0.32);
  }
  .entry-cta:active { transform: scale(0.985); }

  .entry-cta-text {
    font-weight: 200;
    font-size: 13px;
    letter-spacing: 0.42em;
    padding-left: 4px;
    color: rgba(255, 255, 255, 0.94);
    text-shadow: 0 1px 10px rgba(20, 40, 20, 0.22);
  }
  .entry-cta-arrow {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 18px;
    line-height: 1;
    color: rgba(255, 255, 255, 0.88);
    text-shadow: 0 1px 10px rgba(20, 40, 20, 0.22);
    transition: transform 1.4s ease;
  }
  .entry-cta:hover .entry-cta-arrow { transform: translateX(6px); }

  @keyframes entryBreathe {
    0%, 100% { box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10); }
    50%      { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.14); }
  }

  /* States used by JS */
  .entry {
    transition: transform 0.32s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .entry.is-leaving {
    /* press shrink — JS will later set inline transform to pop back to 1.03 */
    transform: translate(-50%, -50%) scale(0.96);
    pointer-events: none;
  }
  .entry-veil.is-leaving {
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .entry.is-gone { display: none !important; }
  .entry-veil.is-gone { display: none !important; }

  /* Pre-entry — hide everything UI except the CTA (scene canvas keeps running) */
  body.pre-entry #ui,
  body.pre-entry .player,
  body.pre-entry .hint,
  body.pre-entry .toast {
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.6s ease;
  }
  /* Player has !important opacity normally — override only during pre-entry */
  body.pre-entry .player {
    opacity: 0 !important;
    visibility: hidden !important;
  }

  /* Mobile: pull CTA up, avoid safe-area, keep editorial whitespace */
  @media (max-width: 768px) {
    .entry { top: 56%; gap: 18px; }
    .entry-cta {
      padding: 15px 22px;
      gap: 13px;
      min-height: 52px;
    }
    .entry-cta-text { font-size: 12px; letter-spacing: 0.36em; }
    .entry-cta-arrow { font-size: 16px; }
  }
  @media (max-width: 380px) {
    .entry-cta-text { font-size: 11px; letter-spacing: 0.30em; }
  }
</style>
</head>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
/* ============================================================
   Sanctuary · 安全岛
   Portrait-first forest creek · Three.js + GSAP
   ============================================================ */

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || innerWidth < 768;
const isPortrait = innerHeight > innerWidth;

/* ---------- Scene ---------- */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc8e6a8, 0.030);

const camera = new THREE.PerspectiveCamera(
  isPortrait ? 64 : 54,
  innerWidth / innerHeight, 0.1, 250
);
// portrait composition: a bit higher & further, looking slightly down
camera.position.set(0, 5.2, 13);
camera.lookAt(0, 1.4, -8);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('scene'),
  antialias: !isMobile,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.25 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

function setVh() {
  document.documentElement.style.setProperty('--vh', `${innerHeight * 0.01}px`);
}
setVh();

/* ---------- Sky dome (fresh green-blue afternoon) ---------- */
const skyUniforms = {
  uTop:    { value: new THREE.Color(0xa7d6f4) }, // soft sky blue high
  uMid:    { value: new THREE.Color(0xd6ecc8) }, // pale green-cream
  uBottom: { value: new THREE.Color(0xeff5d8) }, // cream horizon
};
const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms,
  side: THREE.BackSide,
  depthWrite: false,
  vertexShader: `
    varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vDir;
    uniform vec3 uTop;
    uniform vec3 uMid;
    uniform vec3 uBottom;
    void main() {
      float h = vDir.y;
      vec3 col;
      if (h >= 0.0) col = mix(uMid, uTop, smoothstep(0.0, 0.75, h));
      else          col = mix(uBottom, uMid, smoothstep(-0.4, 0.0, h));
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
const skyDome = new THREE.Mesh(new THREE.SphereGeometry(110, 32, 24), skyMat);
scene.add(skyDome);

/* ---------- Lights ---------- */
const ambient = new THREE.AmbientLight(0xfff5d8, 0.45);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff0c8, 0.65);
sun.position.set(-18, 22, -10);
scene.add(sun);

const hemi = new THREE.HemisphereLight(0xeaf7d4, 0x4a6a30, 0.45);
scene.add(hemi);

const fillBack = new THREE.DirectionalLight(0xffe9b8, 0.3);
fillBack.position.set(8, 10, 14);
scene.add(fillBack);

/* ---------- Sun visual (very soft, off-center, upper-right) ---------- */
function radialTex(stops) {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  stops.forEach(s => g.addColorStop(s[0], s[1]));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
}

const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.9, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xfff0c0, transparent: true, opacity: 0.45 })
);
sunMesh.position.set(22, 22, -48);
scene.add(sunMesh);

const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: radialTex([
    [0,    'rgba(255,240,200,0.45)'],
    [0.35, 'rgba(255,225,170,0.18)'],
    [1,    'rgba(255,200,130,0)']
  ]),
  transparent: true,
  opacity: 0.45,
  blending: THREE.NormalBlending,
  depthWrite: false,
}));
sunGlow.scale.set(28, 28, 1);
sunGlow.position.copy(sunMesh.position);
scene.add(sunGlow);

const sunHalo = new THREE.Sprite(new THREE.SpriteMaterial({
  map: radialTex([
    [0,    'rgba(255,235,190,0.18)'],
    [0.4,  'rgba(255,215,150,0.06)'],
    [1,    'rgba(255,200,130,0)']
  ]),
  transparent: true,
  opacity: 0.5,
  blending: THREE.NormalBlending,
  depthWrite: false,
}));
sunHalo.scale.set(72, 72, 1);
sunHalo.position.copy(sunMesh.position);
scene.add(sunHalo);

/* ---------- Ground: lush green grass plain ---------- */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(180, 180, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x6ba24a, roughness: 1, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

/* ============================================================
   No stream. The forest itself is the subject now.
   distToStream is kept as a no-op so legacy placement code still works.
   ============================================================ */
function distToStream() { return Infinity; }

/* ---------- Forest-floor pebbles (sparse, scattered) ---------- */
const pebbleGeo = new THREE.IcosahedronGeometry(0.10, 0);
const pebbleMatA = new THREE.MeshStandardMaterial({ color: 0x9a8a70, roughness: 0.95 });
const pebbleMatB = new THREE.MeshStandardMaterial({ color: 0x807055, roughness: 1 });

const pebbleCount = isMobile ? 30 : 50;
for (let i = 0; i < pebbleCount; i++) {
  const r  = 6 + Math.random() * 22;
  const a  = Math.random() * Math.PI * 2;
  const x  = Math.cos(a) * r;
  const z  = Math.sin(a) * r - 6;
  const m  = new THREE.Mesh(pebbleGeo, Math.random() > 0.5 ? pebbleMatA : pebbleMatB);
  m.position.set(x, 0.04 + Math.random() * 0.05, z);
  m.scale.setScalar(0.3 + Math.random() * 0.8);
  m.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  scene.add(m);
}

/* ============================================================
   Grass — fresh sunlit green
   ============================================================ */
const bladeGeo = new THREE.PlaneGeometry(0.07, 0.6, 1, 4);
bladeGeo.translate(0, 0.3, 0);

const grassUniforms = {
  uTime:     { value: 0 },
  uWind:     { value: 1.0 },
  uSunColor: { value: new THREE.Color(0xfff2c0) },
};
const grassMat = new THREE.ShaderMaterial({
  uniforms: grassUniforms,
  side: THREE.DoubleSide,
  vertexShader: `
    uniform float uTime;
    uniform float uWind;
    varying float vY;
    varying vec3  vWPos;
    void main() {
      vec3 pos = position;
      vec4 world = instanceMatrix * vec4(pos, 1.0);
      float t = uTime;
      float wave =
        sin(t * 0.9 + world.x * 0.32 + world.z * 0.28) * 0.32 +
        sin(t * 1.6 + world.z * 0.55) * 0.13;
      float side = cos(t * 0.7 + world.x * 0.22) * 0.16;
      float tip = pow(uv.y, 1.7);
      world.x += wave * tip * uWind;
      world.z += side * tip * uWind;
      vY = uv.y;
      vWPos = world.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * world;
    }
  `,
  fragmentShader: `
    varying float vY;
    varying vec3 vWPos;
    uniform vec3 uSunColor;
    void main() {
      // fresh sunlit green: deep base → bright lime → sun-kissed tip
      vec3 bottom = vec3(0.20, 0.32, 0.12);
      vec3 mid    = vec3(0.43, 0.66, 0.24);
      vec3 top    = mix(vec3(0.74, 0.86, 0.42), uSunColor, 0.35);
      vec3 col = mix(bottom, mid, smoothstep(0.0, 0.55, vY));
      col = mix(col, top, smoothstep(0.5, 1.0, vY));
      col += uSunColor * 0.16 * pow(vY, 5.0);
      // mild fog blend
      float d = length(vWPos.xz);
      col = mix(col, vec3(0.82, 0.92, 0.72), smoothstep(22.0, 70.0, d) * 0.55);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const GRASS_TARGET = isMobile ? 5200 : 11000;
const grass = new THREE.InstancedMesh(bladeGeo, grassMat, GRASS_TARGET);
const dummy = new THREE.Object3D();
let placed = 0;
for (let i = 0; i < GRASS_TARGET * 3 && placed < GRASS_TARGET; i++) {
  const x = (Math.random() - 0.5) * 90;
  const z = (Math.random() - 0.5) * 90 - 4;
  if (distToStream(x, z) < 2.4) continue; // outside the wider creek, grass meets bank softly
  dummy.position.set(x, 0, z);
  dummy.rotation.y = Math.random() * Math.PI;
  dummy.scale.setScalar(0.6 + Math.random() * 0.85);
  dummy.updateMatrix();
  grass.setMatrixAt(placed++, dummy.matrix);
}
grass.count = placed;
scene.add(grass);

/* ============================================================
   Trees & bushes — green, layered
   ============================================================ */
// natural forest greens — no neon, no high-sat lime
const NEAR_LEAF_PALETTE = [0x6f9e4a, 0x7fae55, 0x6a9344, 0x789f52];
const FAR_LEAF_PALETTE  = [0x8fbf68, 0x9ccb73, 0x86b962, 0x95c46e];

function makeTree(x, z, palette) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.26, 1.6, 7),
    new THREE.MeshLambertMaterial({ color: 0x5e3a1f })
  );
  trunk.position.y = 0.8;
  g.add(trunk);

  const pal = palette || NEAR_LEAF_PALETTE;
  const leafColor = pal[Math.floor(Math.random() * pal.length)];
  // MeshLambertMaterial → lit by the scene's directional/hemi lights only.
  // No emissive, no Additive blending. Trees stay matte and never glow.
  const leafMat = new THREE.MeshLambertMaterial({ color: leafColor });

  const layers = 3 + Math.floor(Math.random() * 2);
  for (let i = 0; i < layers; i++) {
    const r = 1.35 - i * 0.28;
    const h = 2.2 - i * 0.35;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h, 9), leafMat);
    cone.position.y = 2.0 + i * 0.85;
    cone.rotation.y = Math.random() * Math.PI;
    g.add(cone);
  }
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  g.scale.setScalar(0.95 + Math.random() * 0.9);
  return g;
}

/* ---------- Tree placement: composed, layered, side-banded ----------
   Goal: dense forest hug on left/right + a far layer behind,
   while keeping the stream corridor open. Not random scatter. */

function tryAddTree(x, z, minStreamDist = 4.0, minCamDist = 9) {
  if (distToStream(x, z) < minStreamDist) return false;
  if (Math.sqrt(x * x + (z + 4) * (z + 4)) < minCamDist) return false;
  scene.add(makeTree(x, z));
  return true;
}

// LAYER A — close side bands. Wraps the viewer.
// Mobile: +40%, Desktop: -15% from previous.
const NEAR_PER_SIDE = isMobile ? 40 : 34;
for (let side = -1; side <= 1; side += 2) {
  let placed = 0, tries = 0;
  while (placed < NEAR_PER_SIDE && tries++ < NEAR_PER_SIDE * 6) {
    const xBase = side * (7 + Math.random() * 18);
    const z = -8 - Math.random() * 28;
    const jitter = (Math.random() - 0.5) * 4;
    if (tryAddTree(xBase + jitter, z, 4.0, 9)) placed++;
  }
}

// LAYER B — far backdrop band
const FAR_COUNT = isMobile ? 52 : 42;
for (let i = 0; i < FAR_COUNT; i++) {
  const x = (Math.random() - 0.5) * 140;
  const z = -42 - Math.random() * 18;
  if (distToStream(x, z) < 2.4) continue;
  const t = makeTree(x, z, FAR_LEAF_PALETTE);
  t.scale.multiplyScalar(0.85);
  scene.add(t);
}

// LAYER C — foreground accents flanking the viewer
const FRONT_COUNT = isMobile ? 14 : 10;
for (let i = 0; i < FRONT_COUNT; i++) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const x = side * (14 + Math.random() * 22);
  const z = 4 + Math.random() * 10;
  tryAddTree(x, z, 4.0, 6);
}

// LAYER D (mobile only) — extra trees ahead of the stream to hug horizon
if (isMobile) {
  for (let i = 0; i < 22; i++) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const x = side * (10 + Math.random() * 16);
    const z = -20 - Math.random() * 14;
    tryAddTree(x, z, 4.0, 8);
  }
  // LAYER E (mobile only) — a few trees ahead of the viewer (in front of stream)
  for (let i = 0; i < 10; i++) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const x = side * (16 + Math.random() * 14);
    const z = -3 - Math.random() * 8;  // forward, not blocking center
    tryAddTree(x, z, 4.0, 7);
  }
}

function makeBush(x, z) {
  const g = new THREE.Group();
  const BUSH_PALETTE = [0x6a9344, 0x789f52, 0x82a85a];
  const mat = new THREE.MeshLambertMaterial({
    color: BUSH_PALETTE[Math.floor(Math.random() * BUSH_PALETTE.length)],
  });
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const s = 0.32 + Math.random() * 0.42;
    const b = new THREE.Mesh(new THREE.IcosahedronGeometry(s, 0), mat);
    b.position.set((Math.random() - 0.5) * 0.7, s * 0.55, (Math.random() - 0.5) * 0.7);
    g.add(b);
  }
  g.position.set(x, 0, z);
  return g;
}

/* Bushes scattered through the forest floor (used to hug stream — now free) */
const BUSH_COUNT = isMobile ? 28 : 36;
for (let i = 0; i < BUSH_COUNT; i++) {
  const r = 6 + Math.random() * 26;
  const a = Math.random() * Math.PI * 2;
  const x = Math.cos(a) * r;
  const z = Math.sin(a) * r - 6;
  // skip a small clearing right around camera focus
  if (Math.sqrt(x * x + (z + 4) * (z + 4)) < 6) continue;
  scene.add(makeBush(x, z));
}

/* ============================================================
   Animals — low-poly forest creatures with gentle behaviors
   ============================================================ */

/* Each animal is a tiny THREE.Group with: a body, a head, ears, tail, four legs.
   Materials are warm muted earth tones — no cartoon saturation. */

function softMat(hex) {
  // Lambert: lit by the scene's directional + hemi lights, never emissive.
  return new THREE.MeshLambertMaterial({ color: hex });
}

/* Helper: round-ish ellipsoid from a sphere */
function ellipsoid(rx, ry, rz, mat, segH = 14, segV = 10) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(1, segH, segV), mat);
  m.scale.set(rx, ry, rz);
  return m;
}
function capsule(r, len, mat) {
  // capsule fallback: cylinder + two hemispheres
  const grp = new THREE.Group();
  const cyl = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 10), mat);
  grp.add(cyl);
  const top = new THREE.Mesh(new THREE.SphereGeometry(r, 10, 8), mat);
  top.position.y =  len / 2;
  grp.add(top);
  const bot = new THREE.Mesh(new THREE.SphereGeometry(r, 10, 8), mat);
  bot.position.y = -len / 2;
  grp.add(bot);
  return grp;
}
// Leg with hip pivot: returned Group sits at the hip; the capsule hangs below it.
// Rotate the Group on X to "lift" the leg forward/backward.
function legPivot(r, len, mat) {
  const hip = new THREE.Group();
  const leg = capsule(r, len, mat);
  leg.position.y = -len / 2;
  hip.add(leg);
  hip.userData.length = len;
  return hip;
}
function dot(mat) {
  return new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 6), mat);
}

/* ---------- FOX ---------- */
function makeFox() {
  const g = new THREE.Group();
  const orange = softMat(0xb86a3a);
  const cream  = softMat(0xefdcc2);
  const dark   = softMat(0x3b2418);
  const eye    = softMat(0x1a1208);

  // body — long ellipsoid
  const body = ellipsoid(0.18, 0.16, 0.34, orange);
  body.position.y = 0.30;
  g.add(body);
  const belly = ellipsoid(0.16, 0.08, 0.30, cream);
  belly.position.y = 0.22;
  g.add(belly);

  // head
  const headG = new THREE.Group();
  const headBall = ellipsoid(0.13, 0.13, 0.13, orange);
  headG.add(headBall);
  const snout = ellipsoid(0.06, 0.055, 0.085, cream);
  snout.position.set(0, -0.02, 0.13);
  headG.add(snout);
  const nose = ellipsoid(0.025, 0.022, 0.025, dark);
  nose.position.set(0, -0.012, 0.20);
  headG.add(nose);
  const eL = dot(eye); eL.position.set(-0.06, 0.04, 0.10); headG.add(eL);
  const eR = dot(eye); eR.position.set( 0.06, 0.04, 0.10); headG.add(eR);
  const earGeo = new THREE.ConeGeometry(0.055, 0.13, 12);
  const earL = new THREE.Mesh(earGeo, orange);
  earL.position.set(-0.07, 0.13, 0.0); earL.rotation.z =  0.18; headG.add(earL);
  const earR = new THREE.Mesh(earGeo, orange);
  earR.position.set( 0.07, 0.13, 0.0); earR.rotation.z = -0.18; headG.add(earR);
  headG.position.set(0, 0.40, 0.30);
  g.add(headG);

  // fluffy tail — chain of ellipsoids
  const tailG = new THREE.Group();
  tailG.position.set(0, 0.34, -0.30);
  const tailSegs = [];
  for (let i = 0; i < 5; i++) {
    const k = 1 - i * 0.15;
    const seg = ellipsoid(0.085 * k, 0.085 * k, 0.10, i === 4 ? cream : orange);
    seg.position.z = -i * 0.10;
    seg.position.y = i * 0.012;
    tailG.add(seg);
    tailSegs.push(seg);
  }
  g.add(tailG);

  // legs — hip-pivoted capsules so they can swing forward/back when walking
  const legs = [];
  // FL, FR, BL, BR
  [[-0.10, 0.20], [0.10, 0.20], [-0.10, -0.18], [0.10, -0.18]].forEach(([x, z]) => {
    const l = legPivot(0.04, 0.18, dark);
    l.position.set(x, 0.22, z); // hip height
    g.add(l);
    legs.push(l);
  });

  g.userData.kind = 'fox';
  g.userData.head = headG;
  g.userData.tail = tailG;
  g.userData.tailSegs = tailSegs;
  g.userData.legs = legs;
  return g;
}

/* ---------- RABBIT ---------- */
function makeRabbit() {
  const g = new THREE.Group();
  const fur   = softMat(0xefe6d4);
  const pink  = softMat(0xd9a797);
  const dark  = softMat(0x3a2a1c);
  const eye   = softMat(0x1a1208);

  const body = ellipsoid(0.16, 0.14, 0.20, fur);
  body.position.y = 0.20;
  g.add(body);

  const headG = new THREE.Group();
  const headBall = ellipsoid(0.12, 0.11, 0.12, fur);
  headG.add(headBall);
  const snout = ellipsoid(0.055, 0.05, 0.06, fur);
  snout.position.set(0, -0.02, 0.11);
  headG.add(snout);
  const nose = ellipsoid(0.022, 0.018, 0.020, pink);
  nose.position.set(0, -0.012, 0.16);
  headG.add(nose);
  const eL = dot(eye); eL.position.set(-0.055, 0.025, 0.08); headG.add(eL);
  const eR = dot(eye); eR.position.set( 0.055, 0.025, 0.08); headG.add(eR);

  // long rounded ears — capsules tilted
  const earsG = new THREE.Group();
  const earL = capsule(0.028, 0.16, fur);
  earL.position.set(-0.045, 0.18, 0.02);
  earL.rotation.x = -0.18; earL.rotation.z =  0.10;
  earsG.add(earL);
  const earLin = capsule(0.018, 0.12, pink);
  earLin.position.set(-0.045, 0.185, 0.028);
  earLin.rotation.copy(earL.rotation);
  earsG.add(earLin);
  const earR = capsule(0.028, 0.16, fur);
  earR.position.set(0.045, 0.18, 0.02);
  earR.rotation.x = -0.18; earR.rotation.z = -0.10;
  earsG.add(earR);
  const earRin = capsule(0.018, 0.12, pink);
  earRin.position.set(0.045, 0.185, 0.028);
  earRin.rotation.copy(earR.rotation);
  earsG.add(earRin);
  headG.add(earsG);
  headG.position.set(0, 0.34, 0.13);
  g.add(headG);

  // pom-pom tail
  const tailG = new THREE.Group();
  const tail = ellipsoid(0.065, 0.06, 0.06, fur);
  tailG.add(tail);
  tailG.position.set(0, 0.22, -0.18);
  g.add(tailG);

  // soft feet
  const feet = [];
  [[-0.07, 0.08], [0.07, 0.08], [-0.07, -0.08], [0.07, -0.08]].forEach(([x, z]) => {
    const f = ellipsoid(0.04, 0.025, 0.06, dark);
    f.position.set(x, 0.04, z);
    g.add(f);
    feet.push(f);
  });

  g.userData.kind = 'rabbit';
  g.userData.head = headG;
  g.userData.tail = tailG;
  g.userData.ears = earsG;
  g.userData.legs = feet;
  return g;
}

/* ---------- CAT ---------- */
function makeCat() {
  const g = new THREE.Group();
  const grey  = softMat(0x8a7c66);
  const light = softMat(0xc8b89a);
  const dark  = softMat(0x3a2a20);
  const eye   = softMat(0x1a1208);

  const body = ellipsoid(0.14, 0.13, 0.28, grey);
  body.position.y = 0.26;
  g.add(body);
  const belly = ellipsoid(0.13, 0.07, 0.26, light);
  belly.position.y = 0.20;
  g.add(belly);

  const headG = new THREE.Group();
  const headBall = ellipsoid(0.115, 0.11, 0.115, grey);
  headG.add(headBall);
  const nose = ellipsoid(0.018, 0.014, 0.014, dark);
  nose.position.set(0, -0.025, 0.10);
  headG.add(nose);
  const eL = dot(eye); eL.position.set(-0.055, 0.025, 0.085); headG.add(eL);
  const eR = dot(eye); eR.position.set( 0.055, 0.025, 0.085); headG.add(eR);
  const earGeo = new THREE.ConeGeometry(0.045, 0.08, 10);
  const earL = new THREE.Mesh(earGeo, grey);
  earL.position.set(-0.065, 0.11, 0); earL.rotation.z =  0.18; headG.add(earL);
  const earR = new THREE.Mesh(earGeo, grey);
  earR.position.set( 0.065, 0.11, 0); earR.rotation.z = -0.18; headG.add(earR);
  headG.position.set(0, 0.36, 0.22);
  g.add(headG);

  // curved tail — small ellipsoids
  const tailG = new THREE.Group();
  tailG.position.set(0, 0.30, -0.22);
  const tailSegs = [];
  for (let i = 0; i < 6; i++) {
    const k = 1 - i * 0.10;
    const seg = ellipsoid(0.04 * k, 0.04 * k, 0.07, grey);
    seg.position.z = -i * 0.07;
    seg.position.y = Math.sin(i * 0.55) * 0.04;
    tailG.add(seg);
    tailSegs.push(seg);
  }
  g.add(tailG);

  // legs — hip-pivoted so they swing
  const legs = [];
  [[-0.08, 0.16], [0.08, 0.16], [-0.08, -0.14], [0.08, -0.14]].forEach(([x, z]) => {
    const l = legPivot(0.035, 0.18, dark);
    l.position.set(x, 0.22, z);
    g.add(l);
    legs.push(l);
  });

  g.userData.kind = 'cat';
  g.userData.head = headG;
  g.userData.tail = tailG;
  g.userData.tailSegs = tailSegs;
  g.userData.legs = legs;
  return g;
}

/* ---------- Behavior model ----------
   Each animal lives in one of three states:
     - 'walk'  : moves slowly toward a target, body bobs
     - 'pause' : stands still, head looks around
     - 'sit'   : crouches down briefly (cat / rabbit)
   States transition randomly on long, slow timers. */

const animals = [];
const animalHitboxes = []; // array of meshes used only for raycasting

function spawnAnimal(maker, pos, profile) {
  const a = maker();
  a.position.set(pos.x, 0, pos.z);
  a.rotation.y = Math.random() * Math.PI * 2;
  // Wrap in a parent so we can do click bobs without fighting state.y
  scene.add(a);

  // Invisible hitbox (raycast-only) — larger than the model, finger-friendly
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hit = new THREE.Mesh(new THREE.SphereGeometry(0.75, 12, 8), hitMat);
  hit.position.y = 0.35;
  hit.userData.type = 'animal';
  a.add(hit);
  animalHitboxes.push(hit);

  const entry = {
    obj: a,
    hit,
    kind: a.userData.kind,
    home: { x: pos.x, z: pos.z, r: profile.roam },
    target: new THREE.Vector3(pos.x, 0, pos.z),
    state: 'walk',
    stateTime: 0,
    nextStateAt: 3 + Math.random() * 3,
    speed: profile.speed,
    walkBias: profile.walkBias,
    hopAmp: profile.hopAmp,
    bobPhase: Math.random() * Math.PI * 2,
    headPhase: Math.random() * Math.PI * 2,
    sitOffset: 0,
    clickBob: 0,        // 0..1 pulse triggered on click
    clickLook: 0,       // attention timer — head briefly looks toward camera
    clickWag: 0,        // fast tail wag burst (fox / cat)
    clickHop: 0,        // small hop pulse (rabbit) — full cycle ~0.55s
    earWiggle: 0,       // rabbit ear pulse
    nextRabbitHopAt: 3 + Math.random() * 3, // standalone idle-hop timer
  };
  hit.userData.animal = entry;
  animals.push(entry);
  pickAnimalTarget(entry); // always assign a first target so 'walk' state moves
  return entry;
}

// FOX — right side mid-ground, walks visibly across the meadow
spawnAnimal(makeFox, { x:  4, z:  1 }, { roam: 5.0, speed: 0.55, walkBias: 0.75, hopAmp: 0.0  });
// RABBIT — left of camera, hops noticeably
spawnAnimal(makeRabbit, { x: -3, z:  0 }, { roam: 3.0, speed: 0.85, walkBias: 0.55, hopAmp: 0.16 });
// CAT — front right, slow walker
spawnAnimal(makeCat, { x:  6, z: -4 }, { roam: 4.0, speed: 0.45, walkBias: 0.65, hopAmp: 0.0  });

// Mobile: keep only fox + rabbit
if (isMobile) {
  const catEntry = animals.find(a => a.kind === 'cat');
  if (catEntry) {
    scene.remove(catEntry.obj);
    const idx = animals.indexOf(catEntry);
    animals.splice(idx, 1);
    const hbIdx = animalHitboxes.indexOf(catEntry.hit);
    if (hbIdx >= 0) animalHitboxes.splice(hbIdx, 1);
  }
}

function pickAnimalTarget(a) {
  for (let i = 0; i < 8; i++) {
    const ang = Math.random() * Math.PI * 2;
    const r = a.home.r * (0.4 + Math.random() * 0.6);
    const tx = a.home.x + Math.cos(ang) * r;
    const tz = a.home.z + Math.sin(ang) * r;
    if (Math.sqrt(tx * tx + (tz - 6) * (tz - 6)) < 2) continue;
    a.target.set(tx, 0, tz);
    return;
  }
  a.target.set(a.home.x, 0, a.home.z);
}

function updateAnimals(dt, t) {
  for (const a of animals) {
    a.stateTime += dt;

    // state transitions
    if (a.stateTime >= a.nextStateAt) {
      a.stateTime = 0;
      const r = Math.random();
      if (a.state === 'walk') {
        if (r < 0.55) { a.state = 'pause'; a.nextStateAt = 2 + Math.random() * 2.5; }
        else if (a.kind !== 'fox' && r < 0.78) {
          a.state = 'sit'; a.nextStateAt = 3 + Math.random() * 3;
        } else {
          pickAnimalTarget(a); a.nextStateAt = 4 + Math.random() * 4;
        }
      } else {
        if (r < a.walkBias) {
          a.state = 'walk'; pickAnimalTarget(a); a.nextStateAt = 5 + Math.random() * 5;
        } else {
          a.state = 'pause'; a.nextStateAt = 2 + Math.random() * 2.5;
        }
      }
    }

    const o = a.obj;

    if (a.state === 'walk') {
      const dx = a.target.x - o.position.x;
      const dz = a.target.z - o.position.z;
      const d  = Math.sqrt(dx * dx + dz * dz);
      if (d < 0.15) {
        a.state = 'pause'; a.stateTime = 0; a.nextStateAt = 3 + Math.random() * 4;
      } else {
        const step = Math.min(d, a.speed * dt);
        const nx = dx / d, nz = dz / d;
        o.position.x += nx * step;
        o.position.z += nz * step;
        const yaw = Math.atan2(nx, nz);
        const cur = o.rotation.y;
        const diff = ((yaw - cur + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
        o.rotation.y = cur + diff * Math.min(1, dt * 2.4);

        a.bobPhase += dt * (a.kind === 'rabbit' ? 7.0 : 8.0);
        if (a.kind === 'rabbit') {
          // visible hop: abs(sin) so it lands every half-cycle
          o.position.y = Math.abs(Math.sin(a.bobPhase)) * 0.18;
        } else {
          o.position.y = Math.abs(Math.sin(a.bobPhase)) * 0.04;
        }
        // legs lift & swing — trot gait (diagonal pairs in phase)
        if (o.userData.legs && a.kind !== 'rabbit') {
          // legs order: FL, FR, BL, BR
          const phases = [0, Math.PI, Math.PI, 0];
          o.userData.legs.forEach((hip, i) => {
            const swing = Math.sin(a.bobPhase + phases[i]) * 0.55; // ±31°
            hip.rotation.x = swing;
          });
          // tiny body sway + head bob synced to stride
          o.rotation.z = Math.sin(a.bobPhase * 2) * 0.04;
          if (o.userData.head) {
            o.userData.head.rotation.x =
              (o.userData.head.rotation.x || 0) + Math.sin(a.bobPhase * 2) * 0.015;
          }
        }
      }
    } else if (a.state === 'sit') {
      a.sitOffset = Math.min(a.sitOffset + dt * 0.8, 0.06);
      o.position.y = -a.sitOffset;
      o.rotation.z *= 0.9;
      // ease legs back to neutral
      if (o.userData.legs && a.kind !== 'rabbit') {
        o.userData.legs.forEach(hip => { hip.rotation.x *= 0.85; });
      }
    } else {
      // pause
      a.sitOffset = Math.max(a.sitOffset - dt * 0.8, 0);
      o.position.y = -a.sitOffset;
      o.rotation.z *= 0.9;
      // ease legs back to neutral standing
      if (o.userData.legs && a.kind !== 'rabbit') {
        o.userData.legs.forEach(hip => { hip.rotation.x *= 0.85; });
      }
      // standalone idle hop for rabbit
      if (a.kind === 'rabbit') {
        a.nextRabbitHopAt -= dt;
        if (a.nextRabbitHopAt <= 0) {
          a.nextRabbitHopAt = 3.5 + Math.random() * 3.5;
          a.bobPhase = 0; // start fresh
        }
        // play hop for the first ~0.45s of cycle
        const hopT = Math.max(0, 0.45 - a.nextRabbitHopAt);
        if (hopT > 0 && hopT < 0.45) {
          const k = Math.sin((hopT / 0.45) * Math.PI);
          o.position.y += k * 0.14;
        }
      }
      o.position.y += Math.sin(t * 1.1 + a.bobPhase) * 0.006;
    }

    // click bob — short upward spring, decays toward zero
    if (a.clickBob > 0) {
      a.clickBob = Math.max(0, a.clickBob - dt * 1.6);
      const k = Math.sin(a.clickBob * Math.PI);
      o.position.y += k * 0.18;
    }

    // click hop — single arc (~0.55s) on top of position
    if (a.clickHop > 0) {
      a.clickHop = Math.max(0, a.clickHop - dt);
      const p = 1 - (a.clickHop / 0.55);     // 0..1
      const arc = Math.sin(p * Math.PI);
      o.position.y += arc * 0.22;
    }

    // head: look-around, or briefly look toward camera if just clicked
    if (o.userData.head) {
      if (a.clickLook > 0) {
        a.clickLook = Math.max(0, a.clickLook - dt);
        const camLocalAng = Math.atan2(
          camera.position.x - o.position.x,
          camera.position.z - o.position.z
        ) - o.rotation.y;
        const cur = o.userData.head.rotation.y;
        const diff = ((camLocalAng - cur + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
        o.userData.head.rotation.y = cur + diff * Math.min(1, dt * 2.6);
        o.userData.head.rotation.x = -0.08;
      } else {
        a.headPhase += dt * 0.35;
        o.userData.head.rotation.y = Math.sin(a.headPhase) * 0.45;
        o.userData.head.rotation.x = Math.sin(a.headPhase * 0.6) * 0.10;
      }
    }

    // tail sway — base idle motion
    let tailYaw = Math.sin(t * 1.2 + a.bobPhase) * 0.25;
    // click wag — fast double swing (~0.9s burst) layered on top
    if (a.clickWag > 0) {
      a.clickWag = Math.max(0, a.clickWag - dt);
      const wagP = (0.9 - a.clickWag) / 0.9;      // 0..1
      const wagAmp = Math.sin(wagP * Math.PI);    // ease in/out
      tailYaw += Math.sin(wagP * Math.PI * 4) * 0.85 * wagAmp;
    }
    if (o.userData.tail) o.userData.tail.rotation.y = tailYaw;

    if (o.userData.tailSegs) {
      o.userData.tailSegs.forEach((seg, i) => {
        seg.position.x = Math.sin(t * 1.4 + i * 0.5 + a.bobPhase) * 0.018 * (i + 1) * 0.3;
      });
    }

    // rabbit ears wiggle — when earWiggle > 0 do a fast double shake
    if (a.kind === 'rabbit' && o.userData.ears) {
      a.earWiggle = Math.max(0, a.earWiggle - dt);
      const idle = Math.sin(t * 1.6) * 0.025;
      const shake = a.earWiggle > 0
        ? Math.sin((1 - a.earWiggle / 0.7) * Math.PI * 4) * 0.32
        : 0;
      o.userData.ears.rotation.z = idle + shake;
    }
  }
}

/* ============================================================
   Click feedback — raycaster + floating hearts (no text)
   ============================================================ */

// Active heart sprites — small, soft, upward-drifting
const hearts = [];

function heartTex() {
  // soft heart silhouette drawn on canvas
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.translate(64, 70);
  const path = new Path2D();
  // two arcs + bottom point
  path.moveTo(0, 22);
  path.bezierCurveTo(-46, -10, -38, -52, 0, -28);
  path.bezierCurveTo(38, -52, 46, -10, 0, 22);
  // very soft glow ring first
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(255, 220, 220, 0.55)';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  ctx.fill(path);
  ctx.shadowBlur = 0;
  // subtle inner highlight
  ctx.fillStyle = 'rgba(255, 245, 245, 0.55)';
  ctx.beginPath();
  ctx.ellipse(-10, -14, 7, 4, -0.4, 0, Math.PI * 2);
  ctx.fill();
  return new THREE.CanvasTexture(c);
}
const HEART_TEX = heartTex();

const HEART_COLORS = [0xffb8c8, 0xffa6bd, 0xff95b0, 0xffc5d2];

function emitHearts(x, y, z, count) {
  for (let i = 0; i < count; i++) {
    const mat = new THREE.SpriteMaterial({
      map: HEART_TEX,
      color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
      transparent: true,
      opacity: 0,
      depthWrite: false,
    });
    const sp = new THREE.Sprite(mat);
    const baseSize = 0.16 + Math.random() * 0.06;
    sp.scale.set(baseSize, baseSize, 1);
    sp.position.set(
      x + (Math.random() - 0.5) * 0.30,
      y + 0.15 + Math.random() * 0.10,
      z + (Math.random() - 0.5) * 0.30
    );
    scene.add(sp);
    hearts.push({
      sprite: sp,
      life: 0,
      ttl: 1.2 + Math.random() * 0.25,
      vy: 0.55 + Math.random() * 0.20,
      vx: (Math.random() - 0.5) * 0.06,
      vz: (Math.random() - 0.5) * 0.06,
      sway: Math.random() * Math.PI * 2,
      baseSize,
    });
  }
}

function updateHearts(dt) {
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.life += dt;
    const t = h.life / h.ttl;
    h.sway += dt * 2.2;
    h.sprite.position.x += (h.vx + Math.sin(h.sway) * 0.04) * dt;
    h.sprite.position.y += h.vy * dt;
    h.sprite.position.z += h.vz * dt;
    h.vy *= 0.985;
    // fade in then out — peak opacity ~0.75
    const o = t < 0.20 ? (t / 0.20) : Math.max(0, 1 - (t - 0.20) / 0.80);
    h.sprite.material.opacity = o * 0.9;
    h.sprite.scale.setScalar(h.baseSize * (1 + t * 0.20));
    if (h.life >= h.ttl) {
      scene.remove(h.sprite);
      h.sprite.material.dispose();
      hearts.splice(i, 1);
    }
  }
}
// Backwards-compat: keep the old updateSparkles symbol used in animate()
const updateSparkles = updateHearts;

function feedbackAnimal(entry) {
  // 1. body action reaction
  if (entry.kind === 'fox') {
    // fast tail wag x2 — implemented as bobPhase kick + a short clickWag timer
    entry.clickWag = 0.9;
    entry.clickBob = 0.5;  // tiny torso lift
  } else if (entry.kind === 'rabbit') {
    // small hop + ear shake
    entry.clickHop = 0.55;
    entry.earWiggle = 0.7;
  } else if (entry.kind === 'cat') {
    // tail swing + head lift
    entry.clickWag = 0.9;
    entry.clickLook = 1.0;
  }

  // 2. floating hearts above the animal
  const wp = entry.obj.position;
  emitHearts(wp.x, wp.y + 0.45, wp.z, 3 + Math.floor(Math.random() * 3));
}

// Raycaster for clicks
const _ray = new THREE.Raycaster();
const _ndc = new THREE.Vector2();

function tryAnimalClick(clientX, clientY, originalEvent) {
  const target = originalEvent && originalEvent.target;
  if (target && target.closest &&
      (target.closest('.player') || target.closest('#ui') ||
       target.closest('.fs')     || target.closest('.entry') ||
       target.closest('.toast'))) {
    return false;
  }
  _ndc.x = (clientX / innerWidth) * 2 - 1;
  _ndc.y = -(clientY / innerHeight) * 2 + 1;
  _ray.setFromCamera(_ndc, camera);
  const hits = _ray.intersectObjects(animalHitboxes, false);
  if (hits.length) {
    const hb = hits[0].object;
    const entry = hb.userData.animal;
    if (entry) { feedbackAnimal(entry); return true; }
  }
  return false;
}

window.addEventListener('pointerdown', (e) => {
  // ignore clicks while still in entry ceremony
  if (document.body.classList.contains('pre-entry')) return;
  tryAnimalClick(e.clientX, e.clientY, e);
});

/* ============================================================
   Atmosphere — pollen / dust / dandelion + god rays
   ============================================================ */
function makeParticleSystem(opts) {
  const { count, area, yRange, size, color, tex, blend, speed } = opts;
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3);
  const phase = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    pos[i * 3]     = (Math.random() - 0.5) * area;
    pos[i * 3 + 1] = yRange[0] + Math.random() * (yRange[1] - yRange[0]);
    pos[i * 3 + 2] = (Math.random() - 0.5) * area - 4;
    vel[i * 3]     = (Math.random() - 0.5) * speed.x;
    vel[i * 3 + 1] = speed.y[0] + Math.random() * (speed.y[1] - speed.y[0]);
    vel[i * 3 + 2] = (Math.random() - 0.5) * speed.x;
    phase[i] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    size, map: tex, color,
    transparent: true,
    blending: blend,
    depthWrite: false,
    sizeAttenuation: true,
  });
  return { points: new THREE.Points(geo, mat), pos, vel, phase, count, area, yRange };
}

const pollenTex = radialTex([
  [0,    'rgba(255,255,240,1)'],
  [0.35, 'rgba(255,240,180,0.6)'],
  [1,    'rgba(255,200,120,0)']

/* ---------- God rays ---------- */
function makeGodRay(width, height) {
  const geo = new THREE.PlaneGeometry(width, height);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms: {
      uTime:      { value: 0 },
      uColor:     { value: new THREE.Color(0xffe6b0) },
      uIntensity: { value: 0.22 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    `,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uIntensity;
      void main() {
        float v = 1.0 - vUv.y;
        float h = 1.0 - abs(vUv.x - 0.5) * 2.0;
        h = smoothstep(0.0, 1.0, h);
        float a = pow(h * v, 1.7) * uIntensity;
        a *= 0.85 + sin(uTime * 0.4 + vUv.x * 5.0 + vUv.y * 3.0) * 0.15;
        gl_FragColor = vec4(uColor, a);
      }
    `,
  });
  return new THREE.Mesh(geo, mat);
}

/* ============================================================
   Audio — HTML5 forest BGM (primary) + WebAudio noise (fallback)
   ============================================================ */
const bgm = document.getElementById('bgm');
bgm.volume = 0;
let bgmLoadedOk = false;
bgm.addEventListener('canplay', () => { bgmLoadedOk = true; });
bgm.addEventListener('error',   () => { bgmLoadedOk = false; });

let webAudioCtx = null;
let webAudioMaster = null;
let webAudioNodes = [];
let usingWebAudio = false;

function startWebAudioFallback() {
  if (webAudioCtx) {
    webAudioMaster.gain.cancelScheduledValues(webAudioCtx.currentTime);
    webAudioMaster.gain.linearRampToValueAtTime(0.45, webAudioCtx.currentTime + 3);
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  webAudioCtx = ctx;
  const master = ctx.createGain();
  master.gain.value = 0;
  master.connect(ctx.destination);
  webAudioMaster = master;

  // ---- pink-ish noise buffer ----
  const bufSize = ctx.sampleRate * 4;
  const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < bufSize; i++) {
    const w = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + w * 0.0555179;
    b1 = 0.99332 * b1 + w * 0.0750759;
    b2 = 0.96900 * b2 + w * 0.1538520;
    b3 = 0.86650 * b3 + w * 0.3104856;
    b4 = 0.55000 * b4 + w * 0.5329522;
    b5 = -0.7616 * b5 - w * 0.0168980;
    nd[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.11;
    b6 = w * 0.115926;
  }

  function makeLoop() {
    const src = ctx.createBufferSource();
    src.buffer = noiseBuf;
    src.loop = true;
    return src;
  }

  // ---- soft wind: lowpass-filtered noise with slow LFO on cutoff ----
  const wind = makeLoop();
  const windFilter = ctx.createBiquadFilter();
  windFilter.type = 'lowpass';
  windFilter.frequency.value = 380;
  windFilter.Q.value = 0.6;
  const windGain = ctx.createGain();
  windGain.gain.value = 0.55;
  const windLFO = ctx.createOscillator();
  windLFO.frequency.value = 0.08;
  const windLFOGain = ctx.createGain();
  windLFOGain.gain.value = 180;
  windLFO.connect(windLFOGain).connect(windFilter.frequency);
  wind.connect(windFilter).connect(windGain).connect(master);
  wind.start(); windLFO.start();

  // ---- water: bandpass noise with subtle modulation ----
  const water = makeLoop();
  const waterFilter = ctx.createBiquadFilter();
  waterFilter.type = 'bandpass';
  waterFilter.frequency.value = 1200;
  waterFilter.Q.value = 0.9;
  const waterGain = ctx.createGain();
  waterGain.gain.value = 0.38;
  const waterLFO = ctx.createOscillator();
  waterLFO.frequency.value = 0.5;
  const waterLFOGain = ctx.createGain();
  waterLFOGain.gain.value = 350;
  waterLFO.connect(waterLFOGain).connect(waterFilter.frequency);
  water.connect(waterFilter).connect(waterGain).connect(master);
  water.start(); waterLFO.start();

  // ---- high shimmer: very quiet, like distant insects/leaves ----
  const air = makeLoop();
  const airFilter = ctx.createBiquadFilter();
  airFilter.type = 'highpass';
  airFilter.frequency.value = 4200;
  const airGain = ctx.createGain();
  airGain.gain.value = 0.10;
  air.connect(airFilter).connect(airGain).connect(master);
  air.start();

  // ---- occasional bird chirp (sine blip) ----
  function chirp() {
    if (!webAudioCtx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const baseF = 1800 + Math.random() * 1400;
    osc.frequency.setValueAtTime(baseF, now);
    osc.frequency.exponentialRampToValueAtTime(baseF * (1 + (Math.random()-0.5)*0.4), now + 0.18);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.12, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
    osc.connect(g).connect(master);
    osc.start(now); osc.stop(now + 0.3);
    const next = 6 + Math.random() * 14;
    webAudioNodes.push(setTimeout(chirp, next * 1000));
  }
  webAudioNodes.push(setTimeout(chirp, 3000));

  master.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 3);
}

function stopWebAudioFallback() {
  if (!webAudioCtx) return;
  webAudioMaster.gain.cancelScheduledValues(webAudioCtx.currentTime);
  webAudioMaster.gain.linearRampToValueAtTime(0, webAudioCtx.currentTime + 1.6);
  webAudioNodes.forEach(id => clearTimeout(id));
  webAudioNodes = [];
}

/* ---------- Ambient pad — extremely soft sine drones to layer over BGM ---------- */
let padCtx = null, padGain = null, padOscs = [];
function startAmbientPad() {
  if (padCtx) {
    padGain.gain.cancelScheduledValues(padCtx.currentTime);
    padGain.gain.linearRampToValueAtTime(0.08, padCtx.currentTime + 6);
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  padCtx = ctx;
  const g = ctx.createGain();
  g.gain.value = 0;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 1200;
  lp.Q.value = 0.5;
  g.connect(lp).connect(ctx.destination);
  padGain = g;
  // C major pentatonic-ish stack: C3, G3, E4 — open, "piano pad"-like sine drones
  const freqs = [130.81, 196.00, 329.63];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    osc.detune.value = (Math.random() - 0.5) * 6;
    const vg = ctx.createGain();
    vg.gain.value = 0.33;
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.05 + i * 0.03;
    const lfoG = ctx.createGain();
    lfoG.gain.value = 0.12;
    lfo.connect(lfoG).connect(vg.gain);
    osc.connect(vg).connect(g);
    osc.start(); lfo.start();
    padOscs.push(osc, lfo);
  });
  g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 6);
}
function stopAmbientPad() {
  if (!padCtx) return;
  padGain.gain.cancelScheduledValues(padCtx.currentTime);
  padGain.gain.linearRampToValueAtTime(0, padCtx.currentTime + 2);
}

function fadeInBgm() {
  const target = 0.7;
  const step = () => {
    bgm.volume = Math.min(target, bgm.volume + 0.02);
    if (bgm.volume < target) requestAnimationFrame(step);
  };
  step();
}
function fadeOutBgm() {
  const step = () => {
    bgm.volume = Math.max(0, bgm.volume - 0.03);
    if (bgm.volume > 0) requestAnimationFrame(step);
    else bgm.pause();
  };
  step();
}

async function toggleMusic() {
  if (!state.music) {
    let ok = false;

    // Try real audio first
    try {
      const p = bgm.play();
      if (p !== undefined) await p;
      // play() resolved without throwing → audio is starting
      fadeInBgm();
      usingWebAudio = false;
      ok = true;
    } catch (err) {
      // Could be autoplay block (rare here since user clicked) or network/CORS
      ok = false;
    }

    // If audio failed (e.g. mp3 blocked / offline), fall back to WebAudio noise
    if (!ok) {
      try {
        startWebAudioFallback();
        usingWebAudio = true;
        ok = true;
        toast('使 用 备 用 环 境 音');
      } catch (e2) {
        toast('请 再 次 点 击 播 放');
        return;
      }
    }
    state.music = true;
    setPlayingUI(true);
    startAmbientPad();
    onMusicOn();
  } else {
    if (usingWebAudio) stopWebAudioFallback();
    else fadeOutBgm();
    stopAmbientPad();
    state.music = false;
    setPlayingUI(false);
    onMusicOff();
  }
}

/* ---------- Parallax: pointer / touch / gyroscope ---------- */
let useGyro = false;
let gyroZero = null;

function updateTargets(clientX, clientY) {
  state.targetX = (clientX / innerWidth - 0.5) * 2;
  state.targetY = (clientY / innerHeight - 0.5) * 2;
}
window.addEventListener('pointermove', (e) => { if (!useGyro) updateTargets(e.clientX, e.clientY); });
window.addEventListener('touchmove', (e) => {
  if (useGyro) return;
  const t = e.touches[0];
  if (t) updateTargets(t.clientX, t.clientY);
}, { passive: true });

function handleOrientation(e) {
  if (e.beta == null || e.gamma == null) return;
  if (!gyroZero) gyroZero = { beta: e.beta, gamma: e.gamma };
  const dg = e.gamma - gyroZero.gamma;
  const db = e.beta  - gyroZero.beta;
  state.targetX = Math.max(-0.6, Math.min(0.6, dg / 30));
  state.targetY = Math.max(-0.25, Math.min(0.25, db / 30));
}

const gyroBtn = document.getElementById('gyroBtn');
const hasGyro = 'DeviceOrientationEvent' in window;
if (!hasGyro) {
  gyroBtn.disabled = true;
  gyroBtn.style.opacity = 0.5;
  gyroBtn.textContent = '无 体 感';
}
gyroBtn.addEventListener('click', async () => {
  if (!hasGyro) { toast('当 前 设 备 不 支 持 体 感'); return; }
  if (useGyro) {
    window.removeEventListener('deviceorientation', handleOrientation);
    useGyro = false;
    gyroZero = null;
    gyroBtn.textContent = '开 启 体 感';
    gyroBtn.classList.remove('active');
    return;
  }
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') { toast('未 授 权 体 感'); return; }
    } catch (err) { toast('授 权 失 败'); return; }
  }
  window.addEventListener('deviceorientation', handleOrientation);
  useGyro = true;
  gyroBtn.textContent = '已 启 用 体 感';
  gyroBtn.classList.add('active');
  toast('轻 轻 转 动 手 机');
});

  } catch (err) { /* noop */ }
  fsLabel.textContent = '全 屏 体 验';
}

/* ---------- Entry ceremony — UI fades in only after user clicks ---------- */
const entryEl   = document.getElementById('entry');
const entryVeil = document.getElementById('entryVeil');
const entryCta  = document.getElementById('entryCta');

let entered = false;
async function enterSanctuary() {
  if (entered) return;
  entered = true;

  // 1. Disable CTA so it can't be re-clicked
  entryCta.style.pointerEvents = 'none';
  entryCta.disabled = true;

  // 2. Press feedback only: shrink → spring back. No fade, no blur, no lift.
  entryEl.classList.add('is-leaving');         // scale(0.96)
  setTimeout(() => {
    entryEl.style.transform = 'translate(-50%, -50%) scale(1.03)';
  }, 320);

  // 3. After the spring back finishes (720ms), hard-hide the entry,
  //    THEN reveal masthead + player. Nothing overlaps.
  setTimeout(() => {
    entryEl.classList.add('is-gone');
    entryVeil.classList.add('is-gone');

    // Now (and only now) let the rest of the UI in
    document.body.classList.remove('pre-entry');

    gsap.from('.masthead', { opacity: 0, y: -10, duration: 2.0, delay: 0.1, ease: 'power2.out' });
    gsap.from('.player',   { opacity: 0, y:  10, duration: 1.8, delay: 0.4, ease: 'power2.out',
                             onComplete() { gsap.set('.player', { clearProps: 'opacity,transform' }); } });
  }, 720);

  // Veil dims out gently in parallel
  entryVeil.classList.add('is-leaving');

  // Scene atmosphere lifts immediately on click (slow, 2.2s) — visible behind veil
  gsap.to(ambient, { intensity: 0.50, duration: 2.2, ease: 'power2.out' });
  gsap.to(sun,     { intensity: 0.72, duration: 2.2, ease: 'power2.out' });
  gsap.to(hemi,    { intensity: 0.50, duration: 2.2, ease: 'power2.out' });
  gsap.to(state,   { particleSpeed: 0.85, duration: 2.4, ease: 'power2.out' });

  // Start BGM right away — gives the entry click an immediate audible reward
  try {
    await bgm.play();
    state.music = true;
    setPlayingUI(true);
    startAmbientPad();
    onMusicOn();
    fadeInBgm();
    hintEl.classList.add('fade');
  } catch (err) {
    setPlayingUI(false);
  }
}

entryCta.addEventListener('click', enterSanctuary);
entryCta.addEventListener('touchend', (e) => { e.preventDefault(); enterSanctuary(); }, { passive: false });

/* ---------- Breath phase label — synced to .core animation cycle ---------- */
(function syncBreath() {
  const phaseEl = document.querySelector('.breath-orb .phase');
  const coreEl  = document.querySelector('.breath-orb .core');
  if (!phaseEl || !coreEl) return;

  function cycle() {
    // Inhale 4s
    phaseEl.style.opacity = '0';
    setTimeout(() => {
      phaseEl.textContent = '吸 气';
      phaseEl.style.opacity = '1';
    }, 300);

    // Switch to exhale after 4s
    setTimeout(() => {
      phaseEl.style.opacity = '0';
      setTimeout(() => {
        phaseEl.textContent = '呼 气';
        phaseEl.style.opacity = '1';
      }, 300);
    }, 4000);
  }
  cycle();
  setInterval(cycle, 10000);
})();

/* ---------- Resize ---------- */
function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.fov = (innerHeight > innerWidth) ? 64 : 54;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  setVh();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 200));

/* ============================================================
   Animate
   ============================================================ */
const clock = new THREE.Clock();
const camBase = new THREE.Vector3(0, 5.2, 13);
const camLookAt = new THREE.Vector3(0, 1.4, -8);

function updateParticleSystem(ps, t) {
  const arr = ps.points.geometry.attributes.position.array;
  const halfA = ps.area / 2;
  const speedMul = state.particleSpeed;
  for (let i = 0; i < ps.count; i++) {
    arr[i * 3]     += ps.vel[i * 3]     * speedMul + Math.sin(t * 0.5 + ps.phase[i]) * 0.0018;
    arr[i * 3 + 1] += ps.vel[i * 3 + 1] * speedMul;
    arr[i * 3 + 2] += ps.vel[i * 3 + 2] * speedMul + Math.cos(t * 0.4 + ps.phase[i]) * 0.0014;
    if (arr[i * 3 + 1] > ps.yRange[1]) arr[i * 3 + 1] = ps.yRange[0];
    if (arr[i * 3]     >  halfA) arr[i * 3]     = -halfA;
    if (arr[i * 3]     < -halfA) arr[i * 3]     =  halfA;
    if (arr[i * 3 + 2] >  halfA - 4) arr[i * 3 + 2] = -halfA - 4;
    if (arr[i * 3 + 2] < -halfA - 4) arr[i * 3 + 2] =  halfA - 4;
  }
  ps.points.geometry.attributes.position.needsUpdate = true;
}

function animate() {
  // IMPORTANT: getElapsedTime() internally calls getDelta(), so calling
  // both back-to-back gives dt ≈ 0 and animals never move.
  // Use getDelta() ONCE per frame, then derive t from it.
  const dt = Math.min(0.05, clock.getDelta());
  const t  = clock.elapsedTime;

  grassUniforms.uTime.value = t;

  updateParticleSystem(pollen, t);
  updateParticleSystem(dust, t);
  updateParticleSystem(dandelion, t);

  updateAnimals(dt, t);
  updateSparkles(dt);

  for (const r of godRays) {
    const dx = camera.position.x - r.position.x;
    const dz = camera.position.z - r.position.z;
    r.rotation.y = Math.atan2(dx, dz);
    r.material.uniforms.uTime.value = t;
    r.material.uniforms.uIntensity.value = r.userData.baseIntensity + state.rayBoost;
  }

  state.mouseX += (state.targetX - state.mouseX) * 0.03;
  state.mouseY += (state.targetY - state.mouseY) * 0.03;

  camera.position.x = camBase.x + Math.sin(t * 0.08) * 0.45 + state.mouseX * 0.7;
  camera.position.y = camBase.y + Math.sin(t * 0.10) * 0.18 - state.mouseY * 0.25;
  camera.position.z = camBase.z + Math.cos(t * 0.06) * 0.3;
  camera.lookAt(camLookAt);

  const pulse = 28 + Math.sin(t * 0.18) * 0.7;
  sunGlow.scale.set(pulse, pulse, 1);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
